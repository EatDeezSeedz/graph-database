<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calbet 2014 rapid fat-mass reduction</title>
    <style>
      :root{--bg:#0b0f17;--panel:rgba(17,24,39,.55);--panel2:rgba(15,23,42,.65);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.08);--btn:rgba(255,255,255,.08);--btnHover:rgba(255,255,255,.12)}
      *{box-sizing:border-box} html,body{height:100%;margin:0}
      body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 900px at 20% 10%,rgba(34,197,94,.13),transparent 45%),radial-gradient(900px 700px at 80% 15%,rgba(96,165,250,.12),transparent 45%),var(--bg);color:var(--text);overflow:hidden}
      .wrap{min-height:100dvh;height:100%;display:grid;grid-template-rows:auto 1fr}
      .top{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:blur(12px);align-items:center}
      .title{font-weight:750;font-size:13px}.subtitle{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.35}
      .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .btn,select{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:7px 10px;border-radius:12px;font-weight:650;font-size:12px}.btn{cursor:pointer}.btn:hover{background:var(--btnHover)} select,option,optgroup{background:var(--panel);color:var(--text)}
      .status{color:var(--muted);font-size:12px;white-space:nowrap}
      .main{display:grid;grid-template-columns:minmax(240px,30vw) 1fr;min-height:0}
      .left{border-right:1px solid var(--border);background:var(--panel2);backdrop-filter:blur(12px);padding:10px 10px 12px;overflow:auto}
      .sectionTitle{font-weight:750;font-size:12px;margin:4px 4px 10px;color:var(--muted)}
      .check{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:14px;margin:8px 4px;background:rgba(0,0,0,.14);cursor:pointer;transition:background 120ms ease,border-color 120ms ease,box-shadow 120ms ease}.check:hover{background:rgba(255,255,255,.05)}.check.active{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
      .swatch{width:12px;height:12px;border-radius:4px;border:1px solid rgba(255,255,255,.25)} .check label{font-size:12px;font-weight:650}
      .hint{margin:8px 4px 0;font-size:12px;color:var(--muted);line-height:1.4}
      .stage{position:relative;overflow:hidden;min-width:0;height:min(54dvh,calc(100dvh - 220px));min-height:300px;touch-action:none;cursor:grab}.stage.is-dragging{cursor:grabbing}
      canvas{width:100%;height:100%;display:block}
      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}
      .tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text);font-size:12px;display:none;z-index:20;backdrop-filter:blur(8px)} .tooltip .muted{color:var(--muted);font-weight:650}
      @media (max-width:860px){html,body{height:auto;overflow:auto}body{overflow:auto}.wrap{height:auto;min-height:100vh;grid-template-rows:auto auto}.top{grid-template-columns:1fr}.controls{justify-content:flex-start;gap:6px}.btn,select{padding:6px 9px;font-size:11px}.status{width:100%;white-space:normal}.subtitle,.hint,.overlay{display:none}.main{display:flex;flex-direction:column}.left{border-right:none;border-bottom:1px solid var(--border);order:2;max-height:min(14rem,20dvh);padding-bottom:8px}.check{margin:6px 4px;padding:7px 8px}.stage{order:1;min-height:clamp(250px,52dvh,440px);flex:0 0 auto}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">Calbet et al. (2014) - Exercise plus caloric restriction</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <select id="mode"></select>
          <button id="fit" class="btn">Fit</button>
          <button id="reset" class="btn">Reset</button>
          <button id="all" class="btn">Show all</button>
          <button id="none" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>
      <div class="main">
        <div class="left">
          <div class="sectionTitle">Toggle series</div>
          <div id="checks"></div>
          <div id="hint" class="hint"></div>
        </div>
        <div id="stage" class="stage">
          <canvas id="c"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="tip" class="tooltip"></div>
        </div>
      </div>
    </div>
    <script>
      const PHASES=[0,1,2,3,4];
      const LABELS=['Pre','WCR','DIET','POST1','POST2'];
      const COLORS={fat:'#22c55e',lean:'#60a5fa',weight:'#a78bfa',leptin:'#f97316'};
      const baseline={fat:31.4467,lean:64.3267,weight:99.12};
      const MODES={
        change:{
          label:'Change from baseline',
          subtitle:'Mean changes reported in the abstract after 4 days of walking + caloric restriction (WCR), after the 3-day diet phase (DIET), 4 weeks later (POST1), and 1 year later (POST2).',
          hint:'The big study take-away is that fat mass stayed meaningfully reduced at every follow-up, while lean mass loss was largest during the acute WCR phase and then mostly recovered.',
          overlay:'Hover = reported mean change',
          yLabel:'Change from baseline (kg)',
          series:[
            {name:'Fat mass',color:COLORS.fat,points:[{x:0,y:0},{x:1,y:-2.1},{x:2,y:-2.8},{x:3,y:-3.8},{x:4,y:-1.9}],note:'Abstract mean fat-mass change.'},
            {name:'Lean mass',color:COLORS.lean,points:[{x:0,y:0},{x:1,y:-2.8},{x:2,y:-1.0},{x:3,y:-0.5},{x:4,y:-0.4}],note:'Abstract mean lean-mass change.'}
          ],
          bounds:{xMin:0,xMax:4,yMin:-4.5,yMax:0.8}
        },
        absolute:{
          label:'Estimated absolute body composition',
          subtitle:'Approximate absolute means reconstructed from Table 1 baseline body composition and the abstract-reported changes. Baseline is the weighted mean of the sucrose and whey groups.',
          hint:'This mode helps visualize where the participants roughly ended up in absolute kg, not just how much they changed.',
          overlay:'Hover = baseline estimate minus reported change',
          yLabel:'Mass (kg)',
          series:[
            {name:'Fat mass',color:COLORS.fat,points:[{x:0,y:31.4467},{x:1,y:29.3467},{x:2,y:28.6467},{x:3,y:27.6467},{x:4,y:29.5467}],note:'Weighted baseline from Table 1 minus abstract change.'},
            {name:'Lean mass',color:COLORS.lean,points:[{x:0,y:64.3267},{x:1,y:61.5267},{x:2,y:63.3267},{x:3,y:63.8267},{x:4,y:63.9267}],note:'Weighted baseline from Table 1 minus abstract change.'},
            {name:'Body weight',color:COLORS.weight,points:[{x:0,y:99.12},{x:1,y:94.22},{x:2,y:95.32},{x:3,y:94.82},{x:4,y:96.82}],note:'Estimated from baseline body weight minus fat and lean changes only; other body compartments ignored.'}
          ],
          bounds:{xMin:0,xMax:4,yMin:24,yMax:102}
        },
        leptin:{
          label:'Leptin relative to baseline',
          subtitle:'Serum leptin relative to baseline using the abstract-reported reductions of 64%, 50%, and 33% after WCR, DIET, and POST1. POST2 was not reported in the abstract.',
          hint:'This is a relative curve because the abstract reports percent reductions, not the raw leptin concentrations for all phases.',
          overlay:'Hover = % of baseline',
          yLabel:'Leptin (% of baseline)',
          series:[
            {name:'Serum leptin',color:COLORS.leptin,points:[{x:0,y:100},{x:1,y:36},{x:2,y:50},{x:3,y:67}],note:'Abstract-reported reductions: 64%, 50%, and 33%.'}
          ],
          bounds:{xMin:0,xMax:4,yMin:20,yMax:110}
        }
      };

      const modeEl=document.getElementById('mode'),checksEl=document.getElementById('checks'),subtitleEl=document.getElementById('subtitle'),hintEl=document.getElementById('hint'),overlayEl=document.getElementById('overlay'),statusEl=document.getElementById('status'),stage=document.getElementById('stage'),canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),tip=document.getElementById('tip');
      let modeKey='change',series=[],activeSeries=null,screenSeries=[],dragging=false,lastX=0,lastY=0,dragAxis=null,view={xMin:0,xMax:4,yMin:-4.5,yMax:0.8};
      const currentMode=()=>MODES[modeKey];
      function populateModes(){for(const [k,v] of Object.entries(MODES)){const opt=document.createElement('option');opt.value=k;opt.textContent=v.label;modeEl.appendChild(opt)}modeEl.value=modeKey}
      function rebuildSeries(){series=currentMode().series.map(s=>({visible:true,...s}))}
      function syncActiveRows(){for(const row of checksEl.querySelectorAll('.check'))row.classList.toggle('active',row.dataset.name===activeSeries)}
      function rebuildChecks(){checksEl.innerHTML='';for(const s of series){const row=document.createElement('div');row.className='check';row.dataset.name=s.name;const cb=document.createElement('input');cb.type='checkbox';cb.checked=s.visible;cb.addEventListener('click',e=>e.stopPropagation());cb.addEventListener('change',()=>{s.visible=cb.checked;if(!s.visible&&activeSeries===s.name)activeSeries=null;syncActiveRows();draw()});const sw=document.createElement('div');sw.className='swatch';sw.style.background=s.color;const lab=document.createElement('label');lab.textContent=s.name;row.addEventListener('click',()=>{activeSeries=activeSeries===s.name?null:s.name;syncActiveRows();draw()});row.append(cb,sw,lab);checksEl.appendChild(row)}}
      function resetView(){view={...currentMode().bounds};draw()}
      function fitView(){const visible=series.filter(s=>s.visible),xs=[],ys=[];for(const s of visible){for(const p of s.points){xs.push(p.x);ys.push(p.y)}}if(!xs.length){resetView();return}const base=currentMode().bounds;const xMin=Math.max(base.xMin,Math.min(...xs)),xMax=Math.min(base.xMax,Math.max(...xs)),yMin=Math.min(...ys),yMax=Math.max(...ys),xPad=Math.max(.15,(xMax-xMin)*.08),yPad=Math.max((yMax-yMin)*.12,.5);view=clampView({xMin:xMin-xPad,xMax:xMax+xPad,yMin:yMin-yPad,yMax:yMax+yPad});draw()}
      function clampView(v){const base=currentMode().bounds,padX=Math.max(.35,(base.xMax-base.xMin)*.16),padY=Math.max(.6,(base.yMax-base.yMin)*.16),bounds={xMin:base.xMin-padX,xMax:base.xMax+padX,yMin:base.yMin-padY,yMax:base.yMax+padY},minW=Math.max(.6,(base.xMax-base.xMin)*.08),minH=Math.max(.8,(base.yMax-base.yMin)*.08);let w=Math.max(minW,Math.min(bounds.xMax-bounds.xMin,v.xMax-v.xMin)),h=Math.max(minH,Math.min(bounds.yMax-bounds.yMin,v.yMax-v.yMin)),xMin=v.xMin,yMin=v.yMin;if(xMin<bounds.xMin)xMin=bounds.xMin;if(xMin+w>bounds.xMax)xMin=bounds.xMax-w;if(yMin<bounds.yMin)yMin=bounds.yMin;if(yMin+h>bounds.yMax)yMin=bounds.yMax-h;return{xMin,xMax:xMin+w,yMin,yMax:yMin+h}}
      function resize(){const r=stage.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(r.width*dpr));canvas.height=Math.max(1,Math.floor(r.height*dpr));canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
      function xToPx(x,w,p){return p+(x-view.xMin)*(w/Math.max(1e-6,view.xMax-view.xMin))}
      function yToPx(y,h,p){return p+(view.yMax-y)*(h/Math.max(1e-6,view.yMax-view.yMin))}
      function pxToX(px,w,p){return view.xMin+(px-p)*(view.xMax-view.xMin)/Math.max(1e-6,w)}
      function pxToY(py,h,p){return view.yMax-(py-p)*(view.yMax-view.yMin)/Math.max(1e-6,h)}
      function segDist(px,py,ax,ay,bx,by){const abx=bx-ax,aby=by-ay,apx=px-ax,apy=py-ay,len2=abx*abx+aby*aby;let t=len2?(apx*abx+apy*aby)/len2:0;t=Math.max(0,Math.min(1,t));const cx=ax+t*abx,cy=ay+t*aby;return{dist:Math.hypot(px-cx,py-cy),cx,cy}}
      function nearest(px,py,pts){if(pts.length===1){return{dist:Math.hypot(px-pts[0].px,py-pts[0].py),cx:pts[0].px,cy:pts[0].py}} if(pts.length<2)return null;let best=null;for(let i=0;i<pts.length-1;i++){const hit=segDist(px,py,pts[i].px,pts[i].py,pts[i+1].px,pts[i+1].py);if(!best||hit.dist<best.dist)best=hit}return best}
      function hideTip(){tip.style.display='none'}
      function showTip(html,x,y){tip.innerHTML=html;tip.style.display='block';const r=stage.getBoundingClientRect(),tr=tip.getBoundingClientRect(),pad=14;tip.style.left=Math.max(pad,Math.min(r.width-tr.width-pad,x+pad))+'px';tip.style.top=Math.max(pad,Math.min(r.height-tr.height-pad,y+pad))+'px'}
      function niceStep(range,target=7){const rough=range/target,pow=10**Math.floor(Math.log10(Math.max(rough,1e-9))),mult=rough/pow,niceMult=mult<1.5?1:mult<3?2:mult<7?5:10;return niceMult*pow}
      function drawAxes(padL,padT,w,h){
        const xStep=1,yStep=niceStep(view.yMax-view.yMin);
        ctx.save();ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;
        for(let x=Math.ceil(view.xMin/xStep)*xStep;x<=view.xMax+1e-6;x+=xStep){const px=xToPx(x,w,padL);ctx.beginPath();ctx.moveTo(px,padT);ctx.lineTo(px,padT+h);ctx.stroke()}
        for(let y=Math.ceil(view.yMin/yStep)*yStep;y<=view.yMax+1e-6;y+=yStep){const py=yToPx(y,h,padT);ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(padL+w,py);ctx.stroke()}
        ctx.strokeStyle='rgba(255,255,255,.28)';ctx.strokeRect(padL,padT,w,h);
        ctx.fillStyle='rgba(229,231,235,.92)';ctx.font='12px Segoe UI, system-ui';ctx.textAlign='center';
        for(let x=Math.ceil(view.xMin/xStep)*xStep;x<=view.xMax+1e-6;x+=xStep){const idx=Math.round(x); if(idx>=0&&idx<LABELS.length)ctx.fillText(LABELS[idx],xToPx(x,w,padL),padT+h+18)}
        ctx.textAlign='right';for(let y=Math.ceil(view.yMin/yStep)*yStep;y<=view.yMax+1e-6;y+=yStep)ctx.fillText(String(Math.round(y*10)/10),padL-8,yToPx(y,h,padT)+4);
        ctx.textAlign='center';ctx.fillStyle='rgba(156,163,175,.95)';ctx.fillText('Study phase',padL+w/2,padT+h+42);
        ctx.save();ctx.translate(16,padT+h/2);ctx.rotate(-Math.PI/2);ctx.fillText(currentMode().yLabel,0,0);ctx.restore();ctx.restore()
      }
      function draw(){
        const r=stage.getBoundingClientRect(),W=r.width,H=r.height,padL=82,padT=20,padR=20,padB=60,w=Math.max(10,W-padL-padR),h=Math.max(10,H-padT-padB);
        ctx.clearRect(0,0,W,H);subtitleEl.textContent=currentMode().subtitle;hintEl.textContent=currentMode().hint;overlayEl.textContent=currentMode().overlay;drawAxes(padL,padT,w,h);screenSeries=[];
        for(const s of series){
          if(!s.visible)continue;
          const isActive=activeSeries===s.name,hasActive=!!activeSeries,lineAlpha=hasActive?(isActive?1:.18):1;
          const pts=s.points.filter(p=>p.x>=view.xMin&&p.x<=view.xMax).map(p=>({x:p.x,y:p.y,px:xToPx(p.x,w,padL),py:yToPx(p.y,h,padT)}));
          if(pts.length>1){ctx.save();ctx.strokeStyle=s.color;ctx.lineWidth=isActive?5:3.5;ctx.globalAlpha=lineAlpha;ctx.lineJoin='round';ctx.lineCap='round';if(isActive){ctx.shadowColor=s.color;ctx.shadowBlur=16}ctx.beginPath();ctx.moveTo(pts[0].px,pts[0].py);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].px,pts[i].py);ctx.stroke();ctx.restore()}
          ctx.save();ctx.fillStyle=s.color;ctx.globalAlpha=lineAlpha;for(const p of pts){ctx.beginPath();ctx.arc(p.px,p.py,isActive?4.8:3.8,0,Math.PI*2);ctx.fill()}ctx.restore();
          if(pts.length)screenSeries.push({name:s.name,pts,note:s.note});
        }
        const base=currentMode().bounds,zoomPct=Math.round((base.xMax-base.xMin)/(view.xMax-view.xMin)*100);
        statusEl.textContent=`${series.filter(s=>s.visible).length} lines shown • ${zoomPct}% zoom`
      }
      function applyMode(){activeSeries=null;rebuildSeries();rebuildChecks();syncActiveRows();resetView()}
      modeEl.addEventListener('change',()=>{modeKey=modeEl.value;applyMode()});
      document.getElementById('fit').addEventListener('click',fitView);
      document.getElementById('reset').addEventListener('click',()=>{activeSeries=null;syncActiveRows();resetView()});
      document.getElementById('all').addEventListener('click',()=>{for(const s of series)s.visible=true;for(const cb of checksEl.querySelectorAll('input'))cb.checked=true;syncActiveRows();draw()});
      document.getElementById('none').addEventListener('click',()=>{for(const s of series)s.visible=false;activeSeries=null;for(const cb of checksEl.querySelectorAll('input'))cb.checked=false;syncActiveRows();draw()});
      window.addEventListener('resize',resize);
      stage.addEventListener('pointerdown',e=>{if(e.button!==0)return;dragging=true;dragAxis=null;stage.classList.add('is-dragging');lastX=e.clientX;lastY=e.clientY;stage.setPointerCapture(e.pointerId)});
      stage.addEventListener('pointermove',e=>{
        const r=stage.getBoundingClientRect(),padL=82,padT=20,padR=20,padB=60,w=Math.max(10,r.width-padL-padR),h=Math.max(10,r.height-padT-padB),x=e.clientX-r.left,y=e.clientY-r.top;
        if(dragging){const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;if(!dragAxis){if(Math.abs(dx)<2&&Math.abs(dy)<2)return;dragAxis=Math.abs(dy)>Math.abs(dx)*1.15?'y':'x';}view=clampView({xMin:view.xMin-(dragAxis==='y'?0:dx*(view.xMax-view.xMin)/w),xMax:view.xMax-(dragAxis==='y'?0:dx*(view.xMax-view.xMin)/w),yMin:view.yMin+(dragAxis==='x'?0:dy*(view.yMax-view.yMin)/h),yMax:view.yMax+(dragAxis==='x'?0:dy*(view.yMax-view.yMin)/h)});hideTip();draw();return}
        if(x<padL||x>padL+w||y<padT||y>padT+h){hideTip();return}
        let best=null;for(const s of screenSeries){const hit=nearest(x,y,s.pts);if(hit&&(!best||hit.dist<best.dist))best={...hit,s}}if(!best||best.dist>10){hideTip();return}
        showTip(`<div><strong>${best.s.name}</strong></div><div class='muted'>${LABELS[Math.round(pxToX(best.cx,w,padL))] ?? 'Phase'} | ${pxToY(best.cy,h,padT).toFixed(2)}</div><div class='muted'>${best.s.note}</div>`,x,y)
      });
      stage.addEventListener('pointerup',e=>{dragging=false;dragAxis=null;stage.classList.remove('is-dragging');try{stage.releasePointerCapture(e.pointerId)}catch{}});
      stage.addEventListener('pointercancel',()=>{dragging=false;dragAxis=null;stage.classList.remove('is-dragging');hideTip()});
      stage.addEventListener('pointerleave',()=>{if(!dragging)hideTip()});
      stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect(),padL=82,padT=20,padR=20,padB=60,w=Math.max(10,r.width-padL-padR),h=Math.max(10,r.height-padT-padB);let x=e.clientX-r.left,y=e.clientY-r.top;if(x<padL||x>padL+w||y<padT||y>padT+h){x=padL+w/2;y=padT+h/2}const x0=pxToX(x,w,padL),y0=pxToY(y,h,padT),zoom=e.deltaY>0?1.12:1/1.12,zoomX=e.shiftKey&&!e.ctrlKey?1:zoom,zoomY=e.ctrlKey&&!e.shiftKey?1:zoom;view=clampView({xMin:x0+(view.xMin-x0)*zoomX,xMax:x0+(view.xMax-x0)*zoomX,yMin:y0+(view.yMin-y0)*zoomY,yMax:y0+(view.yMax-y0)*zoomY});hideTip();draw()},{passive:false});
      populateModes();applyMode();resize();
    </script>
  </body>
</html>
