<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>De Troyer et al. (2005) - Intercostal NMM review</title>
    <style>
      :root{--bg:#0b0f17;--panel:rgba(17,24,39,.55);--panel2:rgba(15,23,42,.66);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.08);--btn:rgba(255,255,255,.08);--btnHover:rgba(255,255,255,.12)}
      *{box-sizing:border-box} html,body{height:100%;margin:0}
      body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 900px at 20% 10%,rgba(96,165,250,.14),transparent 45%),radial-gradient(900px 700px at 80% 15%,rgba(34,197,94,.10),transparent 45%),var(--bg);color:var(--text);overflow:hidden}
      .wrap{min-height:100dvh;height:100%;display:grid;grid-template-rows:auto 1fr}
      .top{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:blur(12px);align-items:center}
      .title{font-weight:750;font-size:13px}
      .subtitle{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.35}
      .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .btn,select{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:7px 10px;border-radius:12px;font-weight:650;font-size:12px}
      .btn{cursor:pointer}.btn:hover{background:var(--btnHover)}
      select,option,optgroup{background:#111827;color:var(--text)}
      .status{color:var(--muted);font-size:12px;white-space:nowrap}
      .main{display:grid;grid-template-columns:minmax(280px,30vw) 1fr;min-height:0}
      .left{border-right:1px solid var(--border);background:var(--panel2);backdrop-filter:blur(12px);padding:10px 10px 12px;overflow:auto}
      .sectionTitle{font-weight:750;font-size:12px;margin:4px 4px 10px;color:var(--muted)}
      .check{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:14px;margin:8px 4px;background:rgba(0,0,0,.14);cursor:pointer;transition:background 120ms ease,border-color 120ms ease,box-shadow 120ms ease}
      .check:hover{background:rgba(255,255,255,.05)}
      .check.active{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
      .swatch{width:12px;height:12px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
      .check label{font-size:12px;font-weight:650}
      .hint{margin:8px 4px 0;font-size:12px;color:var(--muted);line-height:1.45}
      .stage{position:relative;overflow:hidden;min-width:0;height:min(40dvh,calc(100dvh - 230px));min-height:270px;touch-action:none;cursor:grab}
      .stage.is-dragging{cursor:grabbing}
      canvas{width:100%;height:100%;display:block}
      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}
      .tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text);font-size:12px;display:none;z-index:20;backdrop-filter:blur(8px);max-width:300px}
      .tooltip .muted{color:var(--muted);font-weight:650}
      @media (max-width:860px){html,body{height:auto;overflow:auto}body{overflow:auto}.wrap{height:auto;min-height:100vh;grid-template-rows:auto auto}.top{grid-template-columns:1fr}.controls{justify-content:flex-start;gap:6px}.btn,select{padding:6px 9px;font-size:11px}.status{width:100%;white-space:normal}.subtitle,.overlay{display:none}.main{display:flex;flex-direction:column}.left{border-right:none;border-bottom:1px solid var(--border);order:2;max-height:min(16rem,24dvh);padding-bottom:8px}.check{margin:6px 4px;padding:7px 8px}.stage{order:1;min-height:clamp(250px,44dvh,360px);flex:0 0 auto}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">De Troyer et al. (2005) - Respiratory action of the intercostal muscles</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <select id="mode"></select>
          <button id="btnFit" class="btn">Fit</button>
          <button id="btnReset" class="btn">Reset</button>
          <button id="btnShowAll" class="btn">Show all</button>
          <button id="btnHideAll" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>
      <div class="main">
        <aside class="left">
          <div class="sectionTitle">Toggle series</div>
          <div id="legend"></div>
          <div id="hint" class="hint"></div>
        </aside>
        <div id="stage" class="stage">
          <canvas id="canvas"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="tooltip" class="tooltip"></div>
        </div>
      </div>
    </div>
    <script>
      const COLORS={mechanics:'#22c55e',drive:'#60a5fa',hypothesis:'#f59e0b'};
      const MODES={
        canineMatching:{
          label:'Canine matching summary',
          subtitle:'Review summary of the canine direct-evidence work: regions with stronger inspiratory or expiratory mechanical advantage were the regions showing stronger inspiratory or expiratory drive during breathing.',
          hint:'This is a synthesis graph, not a single new experiment. It condenses the review’s main canine matching pattern across intercostal regions.',
          overlay:'Relative summary from the review: mechanics and breathing activity track together',
          yLabel:'Relative bias / emphasis',
          categories:['Rostral dorsal external intercostal','Parasternal intercostal','Caudal internal interosseous','Triangularis sterni'],
          series:[
            {key:'mechanics',name:'Mechanical advantage',values:[100,85,-80,-100],notes:[
              'Review summary: rostral dorsal external intercostals had the strongest inspiratory mechanical advantage.',
              'Review summary: parasternals had inspiratory mechanical advantage in the dog.',
              'Review summary: caudal internal interosseous intercostals had strong expiratory mechanical advantage.',
              'Review summary: triangularis sterni had large expiratory mechanical advantage.'
            ]},
            {key:'drive',name:'Neural drive during breathing',values:[95,80,-75,-95],notes:[
              'Review summary: inspiratory activity was strongest where inspiratory mechanical advantage was greatest.',
              'Review summary: parasternal activity was inspiratory, matching its inspiratory mechanics.',
              'Review summary: expiratory activity was strongest in the caudal internal interosseous regions.',
              'Review summary: triangularis sterni was active during expiration only.'
            ]}
          ],
          yMin:-110,
          yMax:110
        },
        gradients:{
          label:'Rostrocaudal gradients',
          subtitle:'Review summary of the canine rostrocaudal gradients emphasized in the paper. Inspiratory external-intercostal advantage and drive fall caudally, while expiratory internal-interosseous emphasis rises caudally.',
          hint:'This is the clearest “why” view: the review says the region-by-region neural-drive gradients were strikingly similar to the region-by-region mechanical-advantage gradients.',
          overlay:'Normalized gradients from rostral to caudal based on the review’s synthesis',
          yLabel:'Relative magnitude',
          categories:['Rostral','Mid','Caudal'],
          series:[
            {key:'mechanics',name:'External-intercostal inspiratory leverage',values:[100,60,20],notes:[
              'Review summary: highest inspiratory leverage rostrally.',
              'Review summary: lower inspiratory leverage in the middle interspaces.',
              'Review summary: much lower or reversed inspiratory leverage caudally.'
            ]},
            {key:'drive',name:'External-intercostal inspiratory drive',values:[95,58,18],notes:[
              'Review summary: inspiratory drive was strongest rostrally.',
              'Review summary: lower inspiratory drive in the middle interspaces.',
              'Review summary: lowest inspiratory drive caudally.'
            ]},
            {key:'hypothesis',name:'Internal-interosseous expiratory bias',values:[20,60,100],notes:[
              'Review summary: less expiratory bias rostrally.',
              'Review summary: more expiratory bias in middle regions.',
              'Review summary: strongest expiratory bias caudally.'
            ]}
          ],
          yMin:-10,
          yMax:110
        },
        metabolicHypothesis:{
          label:'Minimum metabolic cost hypothesis',
          subtitle:'The paper’s theory section argues that matching neural drive to mechanical advantage can reduce the metabolic cost of breathing better than a minimum-work solution.',
          hint:'This is not direct animal data. It is the review’s proposed explanation for why the activation pattern tracks leverage so well.',
          overlay:'Theory summary only: review hypothesis, not a new experiment',
          yLabel:'Relative support',
          categories:['Minimum work model','Observed canine pattern','Minimum metabolic cost model'],
          series:[
            {key:'hypothesis',name:'Fit to observed canine activation',values:[35,100,92],notes:[
              'Review argument: the minimum-work solution did not resemble the intercostal activation pattern well.',
              'Observed canine regional recruitment pattern used as the reference.',
              'Review argument: the minimum-metabolic-cost solution was closer to the intercostal activation pattern.'
            ]}
          ],
          yMin:0,
          yMax:110
        }
      };

      const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
      const stage=document.getElementById('stage'),legend=document.getElementById('legend'),hint=document.getElementById('hint'),overlay=document.getElementById('overlay'),subtitle=document.getElementById('subtitle'),tooltip=document.getElementById('tooltip'),status=document.getElementById('status');
      const modeSel=document.getElementById('mode'),btnFit=document.getElementById('btnFit'),btnReset=document.getElementById('btnReset'),btnShowAll=document.getElementById('btnShowAll'),btnHideAll=document.getElementById('btnHideAll');
      let mode='canineMatching',visible={mechanics:true,drive:true,hypothesis:true},view={minX:0,maxX:5,minY:-110,maxY:110},drag=null;
      Object.entries(MODES).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.label;modeSel.appendChild(o);});
      const cfg=()=>MODES[mode];
      const activeSeries=()=>cfg().series.filter(s=>visible[s.key]);
      function baseBounds(){ const c=cfg(); return {minX:0.5,maxX:c.categories.length+0.5,minY:c.yMin,maxY:c.yMax}; }
      function fit(){ view={...baseBounds()}; draw(); }
      function resize(){ const dpr=window.devicePixelRatio||1, rect=stage.getBoundingClientRect(); canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
      const sx=(x,p)=>p.x+((x-view.minX)/(view.maxX-view.minX))*p.w;
      const sy=(y,p)=>p.y+p.h-((y-view.minY)/(view.maxY-view.minY))*p.h;
      function niceTicks(min,max,target=5){ const span=max-min||1, rough=span/target, pow=Math.pow(10,Math.floor(Math.log10(Math.abs(rough)||1))), norm=rough/pow, step=(norm<=1?1:norm<=2?2:norm<=5?5:10)*pow, out=[]; for(let y=Math.floor(min/step)*step;y<=max+step*0.5;y+=step) out.push(Number(y.toFixed(4))); return out; }
      function wrapText(text,x,y,maxWidth,lineHeight){ const words=String(text).split(' '); let line='', lines=[]; for(const word of words){ const test=line?`${line} ${word}`:word; if(ctx.measureText(test).width>maxWidth&&line){ lines.push(line); line=word; } else line=test; } if(line) lines.push(line); lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight)); }
      function drawAxes(plot){
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.fillStyle='rgba(229,231,235,0.82)'; ctx.font='12px system-ui'; ctx.textAlign='left';
        for(const y of niceTicks(view.minY,view.maxY,5)){ const py=sy(y,plot); ctx.beginPath(); ctx.moveTo(plot.x,py); ctx.lineTo(plot.x+plot.w,py); ctx.stroke(); ctx.fillText(y.toFixed(Math.abs(y)>=10?0:1).replace(/\.0$/,''),16,py+4); }
        ctx.textAlign='center';
        cfg().categories.forEach((cat,idx)=>{ const px=sx(idx+1,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); wrapText(cat,px,plot.y+plot.h+28,120,14); });
        ctx.fillText('Region / concept',plot.x+plot.w/2,plot.y+plot.h+54);
        ctx.save(); ctx.translate(20,plot.y+plot.h/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillText(cfg().yLabel,0,0); ctx.restore();
      }
      function draw(){
        const rect=stage.getBoundingClientRect(),w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h);
        const plot={x:86,y:20,w:Math.max(120,w-116),h:Math.max(110,h-106)};
        drawAxes(plot);
        const series=activeSeries(), markers=[], categories=cfg().categories.length;
        const groupWidth=Math.max(0.25,(view.maxX-view.minX)/Math.max(2,categories*1.5));
        const barWidth=Math.min(0.28,groupWidth/Math.max(1,series.length+0.4));
        series.forEach((s,sIdx)=>{
          s.values.forEach((value,idx)=>{
            const center=(idx+1) - ((series.length-1)/2 - sIdx)*barWidth*1.25;
            const x0=sx(center-barWidth/2,plot), x1=sx(center+barWidth/2,plot);
            const y=sy(value,plot), zeroY=sy(0,plot), top=Math.min(y,zeroY), hBar=Math.max(1,Math.abs(zeroY-y));
            ctx.fillStyle=COLORS[s.key]; ctx.globalAlpha=.92; ctx.fillRect(x0,top,Math.max(1,x1-x0),hBar); ctx.globalAlpha=1;
            ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1.2; ctx.strokeRect(x0,top,Math.max(1,x1-x0),hBar);
            markers.push({x:x0,y:top,w:Math.max(1,x1-x0),h:hBar,series:s,category:idx,value,note:s.notes[idx]});
          });
        });
        const zeroY=sy(0,plot); ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.moveTo(plot.x,zeroY); ctx.lineTo(plot.x+plot.w,zeroY); ctx.stroke();
        ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.moveTo(plot.x,plot.y); ctx.lineTo(plot.x,plot.y+plot.h); ctx.lineTo(plot.x+plot.w,plot.y+plot.h); ctx.stroke();
        stage._plot=plot; stage._markers=markers; status.textContent=`${series.length} series visible`;
      }
      function renderLegend(){
        const c=cfg(); subtitle.textContent=c.subtitle; hint.textContent=c.hint; overlay.textContent=c.overlay; legend.innerHTML='';
        c.series.forEach(s=>{ const row=document.createElement('div'); row.className='check'+(visible[s.key]?' active':''); row.innerHTML=`<input type="checkbox" ${visible[s.key]?'checked':''} /><span class="swatch" style="background:${COLORS[s.key]}"></span><label>${s.name}</label>`; const box=row.querySelector('input'); box.addEventListener('change',e=>{ visible[s.key]=e.target.checked; draw(); renderLegend(); }); row.addEventListener('click',e=>{ if(e.target!==box){ box.checked=!box.checked; visible[s.key]=box.checked; draw(); renderLegend(); }}); legend.appendChild(row); });
      }
      function clampView(){ const b=baseBounds(); const spanX=view.maxX-view.minX, fullSpan=b.maxX-b.minX, minSpan=Math.max(1.2,Math.min(fullSpan,1.3)); if(spanX>fullSpan){ view.minX=b.minX; view.maxX=b.maxX; return; } if(spanX<minSpan){ const mid=(view.minX+view.maxX)/2; view.minX=mid-minSpan/2; view.maxX=mid+minSpan/2; } if(view.minX<b.minX){ view.maxX+=b.minX-view.minX; view.minX=b.minX; } if(view.maxX>b.maxX){ view.minX-=view.maxX-b.maxX; view.maxX=b.maxX; } view.minY=b.minY; view.maxY=b.maxY; }
      function updateTooltip(ev){
        const rect=stage.getBoundingClientRect(), x=ev.clientX-rect.left, y=ev.clientY-rect.top;
        const hit=(stage._markers||[]).find(m=>x>=m.x&&x<=m.x+m.w&&y>=m.y&&y<=m.y+m.h);
        if(!hit){ tooltip.style.display='none'; return; }
        tooltip.innerHTML=`<div><strong>${hit.series.name}</strong></div><div class="muted">${cfg().categories[hit.category]}</div><div>${cfg().yLabel}: <strong>${hit.value.toFixed(1)}</strong></div><div>${hit.note}</div>`;
        tooltip.style.display='block';
        const tipW=tooltip.offsetWidth||220, tipH=tooltip.offsetHeight||90, left=Math.min(stage.clientWidth-tipW-8,Math.max(8,x+14)), top=Math.max(8,(y-tipH-10)>=8?(y-tipH-10):Math.min(stage.clientHeight-tipH-8,y+14));
        tooltip.style.left=`${left}px`; tooltip.style.top=`${top}px`;
      }
      modeSel.addEventListener('change',e=>{ mode=e.target.value; fit(); renderLegend(); resize(); });
      btnFit.addEventListener('click',fit);
      btnReset.addEventListener('click',()=>{ visible={mechanics:true,drive:true,hypothesis:true}; fit(); renderLegend(); });
      btnShowAll.addEventListener('click',()=>{ visible={mechanics:true,drive:true,hypothesis:true}; draw(); renderLegend(); });
      btnHideAll.addEventListener('click',()=>{ visible={mechanics:false,drive:false,hypothesis:false}; draw(); renderLegend(); });
      stage.addEventListener('wheel',e=>{ e.preventDefault(); const plot=stage._plot||{x:86,w:Math.max(120,stage.clientWidth-116)}; const xRatio=Math.min(1,Math.max(0,(e.offsetX-plot.x)/Math.max(1,plot.w))); const factor=e.deltaY>0?1.12:0.88; const span=view.maxX-view.minX; const b=baseBounds(); const newSpan=Math.max(1.2,Math.min(b.maxX-b.minX,span*factor)); const focus=view.minX+span*xRatio; view.minX=focus-newSpan*xRatio; view.maxX=view.minX+newSpan; clampView(); draw(); },{passive:false});
      stage.addEventListener('pointerdown',e=>{ drag={x:e.clientX,minX:view.minX,maxX:view.maxX}; stage.classList.add('is-dragging'); stage.setPointerCapture(e.pointerId); });
      stage.addEventListener('pointermove',e=>{ updateTooltip(e); if(!drag) return; const plot=stage._plot||{w:stage.clientWidth}; const span=drag.maxX-drag.minX, pxPerUnit=(plot.w||stage.clientWidth)/Math.max(0.001,span), dx=(e.clientX-drag.x)/pxPerUnit; view.minX=drag.minX-dx; view.maxX=drag.maxX-dx; clampView(); draw(); updateTooltip(e); });
      stage.addEventListener('pointerup',e=>{ drag=null; stage.classList.remove('is-dragging'); try{stage.releasePointerCapture(e.pointerId);}catch{} });
      stage.addEventListener('pointerleave',()=>tooltip.style.display='none');
      window.addEventListener('resize',resize);
      fit(); renderLegend(); resize();
    </script>
  </body>
</html>
