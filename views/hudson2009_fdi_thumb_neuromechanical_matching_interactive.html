<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hudson 2009 first dorsal interosseous neuromechanical matching</title>
    <style>
      :root{--bg:#0b0f17;--panel:rgba(17,24,39,.55);--panel2:rgba(15,23,42,.66);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.08);--btn:rgba(255,255,255,.08);--btnHover:rgba(255,255,255,.12)}
      *{box-sizing:border-box} html,body{height:100%;margin:0}
      body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 900px at 20% 10%,rgba(96,165,250,.14),transparent 45%),radial-gradient(900px 700px at 80% 15%,rgba(34,197,94,.10),transparent 45%),var(--bg);color:var(--text);overflow:hidden}
      .wrap{min-height:100dvh;height:100%;display:grid;grid-template-rows:auto 1fr}
      .top{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:blur(12px);align-items:center}
      .title{font-weight:750;font-size:13px}
      .subtitle{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.35}
      .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .btn,select{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:7px 10px;border-radius:12px;font-weight:650;font-size:12px}
      .btn{cursor:pointer}.btn:hover{background:var(--btnHover)}
      select,option,optgroup{background:#111827;color:var(--text)}
      .status{color:var(--muted);font-size:12px;white-space:nowrap}
      .main{display:grid;grid-template-columns:minmax(280px,30vw) 1fr;min-height:0}
      .left{border-right:1px solid var(--border);background:var(--panel2);backdrop-filter:blur(12px);padding:10px 10px 12px;overflow:auto}
      .sectionTitle{font-weight:750;font-size:12px;margin:4px 4px 10px;color:var(--muted)}
      .check{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:14px;margin:8px 4px;background:rgba(0,0,0,.14);cursor:pointer;transition:background 120ms ease,border-color 120ms ease,box-shadow 120ms ease}
      .check:hover{background:rgba(255,255,255,.05)}
      .check.active{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
      .swatch{width:12px;height:12px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
      .check label{font-size:12px;font-weight:650}
      .hint{margin:8px 4px 0;font-size:12px;color:var(--muted);line-height:1.45}
      .stage{position:relative;overflow:hidden;min-width:0;height:min(40dvh,calc(100dvh - 230px));min-height:270px;touch-action:none;cursor:grab}
      .stage.is-dragging{cursor:grabbing}
      canvas{width:100%;height:100%;display:block}
      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}
      .tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text);font-size:12px;display:none;z-index:20;backdrop-filter:blur(8px);max-width:280px}
      .tooltip .muted{color:var(--muted);font-weight:650}
      @media (max-width:860px){html,body{height:auto;overflow:auto}body{overflow:auto}.wrap{height:auto;min-height:100vh;grid-template-rows:auto auto}.top{grid-template-columns:1fr}.controls{justify-content:flex-start;gap:6px}.btn,select{padding:6px 9px;font-size:11px}.status{width:100%;white-space:normal}.subtitle,.overlay{display:none}.main{display:flex;flex-direction:column}.left{border-right:none;border-bottom:1px solid var(--border);order:2;max-height:min(16rem,24dvh);padding-bottom:8px}.check{margin:6px 4px;padding:7px 8px}.stage{order:1;min-height:clamp(250px,44dvh,360px);flex:0 0 auto}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">Hudson et al. (2009) - First dorsal interosseous neuromechanical matching</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <select id="mode"></select>
          <button id="btnFit" class="btn">Fit</button>
          <button id="btnReset" class="btn">Reset</button>
          <button id="btnShowAll" class="btn">Show all</button>
          <button id="btnHideAll" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>
      <div class="main">
        <aside class="left">
          <div class="sectionTitle">Toggle series</div>
          <div id="legend"></div>
          <div id="hint" class="hint"></div>
        </aside>
        <div id="stage" class="stage">
          <canvas id="canvas"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="tooltip" class="tooltip"></div>
        </div>
      </div>
    </div>
    <script>
      const SERIES_COLORS={
        thumbDown:'#60a5fa',
        thumbUp:'#ef4444'
      };
      const MODES={
        leverage:{
          label:'Mechanical contribution / leverage',
          type:'bar',
          subtitle:'Thumb posture changed the mechanical contribution of first dorsal interosseous (FDI) to index-finger flexion. With the thumb down, both twitch force and moment arm were higher.',
          hint:'This is the leverage side: thumb down improved FDI flexion mechanics, while thumb up reduced them.',
          overlay:'Bars = study values for thumb down vs thumb up',
          groups:[
            {name:'Flexion twitch force (N)',series:[{key:'thumbDown',name:'Thumb down',value:2.3,raw:'2.3 N',note:'At the largest analyzed angle, flexion twitch force averaged 2.3 ± 1.0 N.'},{key:'thumbUp',name:'Thumb up',value:1.4,raw:'1.4 N',note:'At the comparable thumb-up position, flexion twitch force averaged 1.4 ± 0.8 N.'}]},
            {name:'FDI flexion moment arm (mm)',series:[{key:'thumbDown',name:'Thumb down',value:9.1,raw:'9.1 mm',note:'Ultrasound-based tendon-to-metacarpal distance with thumb down.'},{key:'thumbUp',name:'Thumb up',value:6.5,raw:'6.5 mm',note:'Ultrasound-based tendon-to-metacarpal distance with thumb up.'}]}
          ],
          yLabel:'Magnitude'
        },
        activation:{
          label:'Muscle activation',
          type:'bar',
          subtitle:'During matched 5 N index-flexion tasks, FDI activation was higher with the thumb down, while long-flexor drive showed no consistent increase. Values are shown on a relative scale so both muscles are easy to see.',
          hint:'This is the neural side: when FDI had better leverage, its activation rose. When leverage was poorer, FDI activation fell instead of compensating upward. Hover to see the raw paper values.',
          overlay:'Bars = relative EMG by thumb posture (raw values in tooltip)',
          groups:[
            {name:'FDI activation (% of thumb-down value)',series:[{key:'thumbDown',name:'Thumb down',value:100,raw:'0.014 r.m.s./Mmax',note:'FDI normalized EMG with thumb down was 0.014.'},{key:'thumbUp',name:'Thumb up',value:79,raw:'0.011 r.m.s./Mmax',note:'FDI normalized EMG with thumb up was 0.011, about 21% lower than thumb down.'}]},
            {name:'Long flexor activation (% of thumb-up value)',series:[{key:'thumbDown',name:'Thumb down',value:94,raw:'30.6 μV',note:'Long-flexor EMG with thumb down was 30.6 μV.'},{key:'thumbUp',name:'Thumb up',value:100,raw:'32.4 μV',note:'Long-flexor EMG with thumb up was 32.4 μV and not significantly different.'}]}
          ],
          yLabel:'Relative activation (%)'
        },
        matching:{
          label:'Activation vs leverage',
          type:'scatter',
          subtitle:'Postures with better FDI leverage also had higher FDI activation. The activation axis is shown relative to the thumb-down condition so the relationship is easy to read.',
          hint:'If FDI acted alone, poor leverage would require more activation to hold the same force. Instead, the nervous system reduced FDI activation when its leverage worsened, allowing other muscles to contribute.',
          overlay:'Points = thumb-posture-specific leverage and FDI activation',
          xLabel:'FDI flexion moment arm (mm)',
          yLabel:'FDI activation (% of thumb-down value)',
          points:[
            {key:'thumbDown',name:'Thumb down',x:9.1,y:100,raw:'0.014 r.m.s./Mmax',note:'Better leverage and greater FDI activation.'},
            {key:'thumbUp',name:'Thumb up',x:6.5,y:79,raw:'0.011 r.m.s./Mmax',note:'Poorer leverage and lower FDI activation.'}
          ]
        }
      };

      const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
      const stage=document.getElementById('stage'),legend=document.getElementById('legend'),hint=document.getElementById('hint'),overlay=document.getElementById('overlay'),subtitle=document.getElementById('subtitle'),tooltip=document.getElementById('tooltip'),status=document.getElementById('status');
      const modeSel=document.getElementById('mode'),btnFit=document.getElementById('btnFit'),btnReset=document.getElementById('btnReset'),btnShowAll=document.getElementById('btnShowAll'),btnHideAll=document.getElementById('btnHideAll');
      let mode='leverage',visible={},drag=null,view={minX:0,maxX:5,minY:0,maxY:10};
      Object.keys(MODES).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=MODES[k].label;modeSel.appendChild(o);});

      function cfg(){ return MODES[mode]; }
      function modeKeys(){ return mode==='matching' ? cfg().points.map(p=>p.key) : [...new Set(cfg().groups.flatMap(g=>g.series.map(s=>s.key)))]; }
      function resetVisible(){ visible={}; modeKeys().forEach(k=>visible[k]=true); }
      resetVisible();

      function bounds(){
        if(mode==='matching'){
          const pts=cfg().points.filter(p=>visible[p.key]);
          if(!pts.length) return {minX:6,maxX:10,minY:0,maxY:110};
          const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
          return {minX:Math.min(...xs)-0.6,maxX:Math.max(...xs)+0.6,minY:0,maxY:Math.max(...ys)*1.18};
        }
        const vals=cfg().groups.flatMap(g=>g.series.filter(s=>visible[s.key]).map(s=>s.value));
        if(!vals.length) return {minX:0.4,maxX:cfg().groups.length+0.6,minY:0,maxY:110};
        return {minX:0.4,maxX:cfg().groups.length+0.6,minY:0,maxY:Math.max(...vals)*1.16};
      }
      function fit(){ view={...bounds()}; draw(); }
      function resize(){ const dpr=window.devicePixelRatio||1, rect=stage.getBoundingClientRect(); canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
      const sx=(x,p)=>p.x+((x-view.minX)/(view.maxX-view.minX))*p.w;
      const sy=(y,p)=>p.y+p.h-((y-view.minY)/(view.maxY-view.minY))*p.h;
      function niceTicks(min,max,target=5){ const span=max-min||1, rough=span/target, pow=Math.pow(10,Math.floor(Math.log10(Math.abs(rough)||1))), norm=rough/pow, step=(norm<=1?1:norm<=2?2:norm<=5?5:10)*pow, out=[]; for(let y=Math.floor(min/step)*step;y<=max+step*0.5;y+=step) out.push(Number(y.toFixed(4))); return out; }
      function wrapText(text,x,y,maxWidth,lineHeight){ const words=String(text).split(' '); let line='', lines=[]; for(const word of words){ const test=line?`${line} ${word}`:word; if(ctx.measureText(test).width>maxWidth&&line){ lines.push(line); line=word; } else line=test; } if(line) lines.push(line); lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight)); }

      function drawAxes(plot){
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.fillStyle='rgba(229,231,235,0.82)'; ctx.font='12px system-ui'; ctx.textAlign='left';
        for(const y of niceTicks(view.minY,view.maxY,5)){ const py=sy(y,plot); ctx.beginPath(); ctx.moveTo(plot.x,py); ctx.lineTo(plot.x+plot.w,py); ctx.stroke(); ctx.fillText(y.toFixed(0),16,py+4); }
        ctx.textAlign='center';
        if(mode==='matching'){
          for(const x of niceTicks(view.minX,view.maxX,5)){ const px=sx(x,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); ctx.fillText(x.toFixed(1).replace(/\.0$/,''),px,plot.y+plot.h+28); }
          ctx.fillText(cfg().xLabel,plot.x+plot.w/2,plot.y+plot.h+54);
        } else {
          cfg().groups.forEach((group,idx)=>{ const px=sx(idx+1,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); wrapText(group.name,px,plot.y+plot.h+28,100,14); });
          ctx.fillText('Outcome',plot.x+plot.w/2,plot.y+plot.h+54);
        }
        ctx.save(); ctx.translate(20,plot.y+plot.h/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillText(cfg().yLabel,0,0); ctx.restore();
      }

      function draw(){
        const rect=stage.getBoundingClientRect(),w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h);
        const plot={x:82,y:20,w:Math.max(120,w-112),h:Math.max(110,h-106)};
        drawAxes(plot);
        const markers=[];
        if(mode==='matching'){
          const pts=cfg().points.filter(p=>visible[p.key]).sort((a,b)=>a.x-b.x);
          if(pts.length>1){
            ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=2; ctx.setLineDash([5,4]); ctx.beginPath();
            pts.forEach((p,i)=>{ const x=sx(p.x,plot), y=sy(p.y,plot); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
            ctx.stroke(); ctx.setLineDash([]);
          }
          pts.forEach(p=>{ const x=sx(p.x,plot), y=sy(p.y,plot), color=SERIES_COLORS[p.key]; ctx.fillStyle=color; ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.fillStyle='rgba(229,231,235,.88)'; ctx.font='11px system-ui'; ctx.textAlign='left'; ctx.fillText(p.name,x+10,y-8); markers.push({shape:'point',x,y,r:12,item:p}); });
        } else {
          const groups=cfg().groups;
          groups.forEach((group,idx)=>{
            const shown=group.series.filter(s=>visible[s.key]);
            const barW=Math.max(18,Math.min(50,plot.w/(groups.length*4.2)));
            const totalW=shown.length?shown.length*barW+(shown.length-1)*10:0;
            shown.forEach((item,seriesIdx)=>{
              const xCenter=sx(idx+1,plot)-totalW/2+seriesIdx*(barW+10)+barW/2;
              const y=sy(item.value,plot), zeroY=sy(0,plot), top=Math.min(y,zeroY), hBar=Math.max(1,Math.abs(zeroY-y)), x=xCenter-barW/2;
              const color=SERIES_COLORS[item.key];
              ctx.fillStyle=color; ctx.globalAlpha=.92; ctx.fillRect(x,top,barW,hBar); ctx.globalAlpha=1;
              ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1.2; ctx.strokeRect(x,top,barW,hBar);
              markers.push({shape:'bar',x,top,w:barW,h:hBar,item,group:group.name});
            });
          });
        }
        ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.moveTo(plot.x,plot.y); ctx.lineTo(plot.x,plot.y+plot.h); ctx.lineTo(plot.x+plot.w,plot.y+plot.h); ctx.stroke();
        stage._markers=markers; stage._plot=plot; status.textContent=`${markers.length} items visible`;
      }

      function renderLegend(){
        subtitle.textContent=cfg().subtitle; hint.textContent=cfg().hint; overlay.textContent=cfg().overlay; legend.innerHTML='';
        const entries = mode==='matching'
          ? cfg().points.map(p=>({key:p.key,name:p.name}))
          : [{key:'thumbDown',name:'Thumb down'},{key:'thumbUp',name:'Thumb up'}];
        entries.forEach(entry=>{
          const row=document.createElement('div');
          row.className='check'+(visible[entry.key]?' active':'');
          row.innerHTML=`<input type="checkbox" ${visible[entry.key]?'checked':''} /><span class="swatch" style="background:${SERIES_COLORS[entry.key]}"></span><label>${entry.name}</label>`;
          const box=row.querySelector('input');
          box.addEventListener('change',e=>{ visible[entry.key]=e.target.checked; fit(); renderLegend(); });
          row.addEventListener('click',e=>{ if(e.target!==box){ box.checked=!box.checked; visible[entry.key]=box.checked; fit(); renderLegend(); }});
          legend.appendChild(row);
        });
      }

      function updateTooltip(ev){
        const rect=stage.getBoundingClientRect(), x=ev.clientX-rect.left, y=ev.clientY-rect.top;
        const hit=(stage._markers||[]).find(m=>m.shape==='bar'?(x>=m.x&&x<=m.x+m.w&&y>=m.top&&y<=m.top+m.h):Math.hypot(m.x-x,m.y-y)<=m.r);
        if(!hit){ tooltip.style.display='none'; return; }
        if(mode==='matching'){
          const p=hit.item;
          tooltip.innerHTML=`<div><strong>${p.name}</strong></div><div class="muted">Activation vs leverage</div><div>${cfg().xLabel}: <strong>${p.x.toFixed(1)} mm</strong></div><div>${cfg().yLabel}: <strong>${p.y.toFixed(0)}%</strong></div><div>Raw FDI EMG: <strong>${p.raw}</strong></div><div>${p.note}</div>`;
        } else {
          const item=hit.item;
          tooltip.innerHTML=`<div><strong>${item.name}</strong></div><div class="muted">${hit.group}</div><div>Relative value: <strong>${item.value.toFixed(0)}%</strong></div><div>Raw value: <strong>${item.raw}</strong></div><div>${item.note}</div>`;
        }
        tooltip.style.display='block';
        const tipW=tooltip.offsetWidth||220, tipH=tooltip.offsetHeight||90, left=Math.min(stage.clientWidth-tipW-8,Math.max(8,x+14)), top=Math.max(8,(y-tipH-10)>=8?(y-tipH-10):Math.min(stage.clientHeight-tipH-8,y+14));
        tooltip.style.left=`${left}px`; tooltip.style.top=`${top}px`;
      }

      function clampView(){
        const b=bounds(); const spanX=view.maxX-view.minX;
        if(spanX>(b.maxX-b.minX)){ view.minX=b.minX; view.maxX=b.maxX; return; }
        if(view.minX<b.minX){ view.maxX+=b.minX-view.minX; view.minX=b.minX; }
        if(view.maxX>b.maxX){ view.minX-=view.maxX-b.maxX; view.maxX=b.maxX; }
      }

      modeSel.addEventListener('change',e=>{ mode=e.target.value; resetVisible(); fit(); renderLegend(); resize(); });
      btnFit.addEventListener('click',fit);
      btnReset.addEventListener('click',()=>{ resetVisible(); fit(); renderLegend(); });
      btnShowAll.addEventListener('click',()=>{ modeKeys().forEach(k=>visible[k]=true); fit(); renderLegend(); });
      btnHideAll.addEventListener('click',()=>{ modeKeys().forEach(k=>visible[k]=false); fit(); renderLegend(); });
      stage.addEventListener('wheel',e=>{ e.preventDefault(); const plot=stage._plot||{x:82,w:Math.max(120,stage.clientWidth-112)}; const xRatio=Math.min(1,Math.max(0,(e.offsetX-plot.x)/Math.max(1,plot.w))); const factor=e.deltaY>0?1.12:0.88; const span=view.maxX-view.minX; const b=bounds(); const minSpan=mode==='matching'?1.2:1.1; const newSpan=Math.max(minSpan,Math.min(b.maxX-b.minX,span*factor)); const focus=view.minX+span*xRatio; view.minX=focus-newSpan*xRatio; view.maxX=view.minX+newSpan; clampView(); draw(); },{passive:false});
      stage.addEventListener('pointerdown',e=>{ drag={x:e.clientX,minX:view.minX,maxX:view.maxX}; stage.classList.add('is-dragging'); stage.setPointerCapture(e.pointerId); });
      stage.addEventListener('pointermove',e=>{ updateTooltip(e); if(!drag) return; const plot=stage._plot||{w:stage.clientWidth}; const span=drag.maxX-drag.minX, pxPerUnit=(plot.w||stage.clientWidth)/Math.max(0.001,span), dx=(e.clientX-drag.x)/pxPerUnit; view.minX=drag.minX-dx; view.maxX=drag.maxX-dx; clampView(); draw(); updateTooltip(e); });
      stage.addEventListener('pointerup',e=>{ drag=null; stage.classList.remove('is-dragging'); try{stage.releasePointerCapture(e.pointerId);}catch{} });
      stage.addEventListener('pointerleave',()=>tooltip.style.display='none');
      window.addEventListener('resize',resize);
      fit(); renderLegend(); resize();
    </script>
  </body>
</html>
