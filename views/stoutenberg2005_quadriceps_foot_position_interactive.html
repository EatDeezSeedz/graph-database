<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stoutenberg 2005 quadriceps EMG during leg extension</title>
    <style>
      :root{--bg:#0b0f17;--panel:rgba(17,24,39,.55);--panel2:rgba(15,23,42,.66);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.08);--btn:rgba(255,255,255,.08);--btnHover:rgba(255,255,255,.12)}
      *{box-sizing:border-box} html,body{height:100%;margin:0}
      body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 900px at 20% 10%,rgba(96,165,250,.14),transparent 45%),radial-gradient(900px 700px at 80% 15%,rgba(34,197,94,.10),transparent 45%),var(--bg);color:var(--text);overflow:hidden}
      .wrap{min-height:100dvh;height:100%;display:grid;grid-template-rows:auto 1fr}
      .top{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:blur(12px);align-items:center}
      .title{font-weight:750;font-size:13px}
      .subtitle{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.35}
      .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .btn,select{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:7px 10px;border-radius:12px;font-weight:650;font-size:12px}
      .btn{cursor:pointer}.btn:hover{background:var(--btnHover)}
      select,option,optgroup{background:#111827;color:var(--text)}
      .status{color:var(--muted);font-size:12px;white-space:nowrap}
      .main{display:grid;grid-template-columns:minmax(260px,28vw) 1fr;min-height:0}
      .left{border-right:1px solid var(--border);background:var(--panel2);backdrop-filter:blur(12px);padding:10px 10px 12px;overflow:auto}
      .sectionTitle{font-weight:750;font-size:12px;margin:4px 4px 10px;color:var(--muted)}
      .check{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:14px;margin:8px 4px;background:rgba(0,0,0,.14);cursor:pointer;transition:background 120ms ease,border-color 120ms ease,box-shadow 120ms ease}
      .check:hover{background:rgba(255,255,255,.05)}
      .check.active{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
      .swatch{width:12px;height:12px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
      .check label{font-size:12px;font-weight:650}
      .hint{margin:8px 4px 0;font-size:12px;color:var(--muted);line-height:1.45}
      .stage{position:relative;overflow:hidden;min-width:0;height:min(44dvh,calc(100dvh - 230px));min-height:290px;touch-action:none;cursor:grab}
      .stage.is-dragging{cursor:grabbing}
      canvas{width:100%;height:100%;display:block}
      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}
      .tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text);font-size:12px;display:none;z-index:20;backdrop-filter:blur(8px)}
      .tooltip .muted{color:var(--muted);font-weight:650}
      @media (max-width:860px){
        html,body{height:auto;overflow:auto}body{overflow:auto}
        .wrap{height:auto;min-height:100vh;grid-template-rows:auto auto}
        .top{grid-template-columns:1fr}
        .controls{justify-content:flex-start;gap:6px}
        .btn,select{padding:6px 9px;font-size:11px}
        .status{width:100%;white-space:normal}
        .subtitle,.overlay{display:none}
        .main{display:flex;flex-direction:column}
        .left{border-right:none;border-bottom:1px solid var(--border);order:2;max-height:min(15rem,22dvh);padding-bottom:8px}
        .check{margin:6px 4px;padding:7px 8px}
        .stage{order:1;min-height:clamp(260px,46dvh,380px);flex:0 0 auto}
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">Stoutenberg et al. (2005) - Foot position and superficial quadriceps EMG during leg extension</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <select id="mode"></select>
          <button id="btnFit" class="btn">Fit</button>
          <button id="btnReset" class="btn">Reset</button>
          <button id="btnShowAll" class="btn">Show all</button>
          <button id="btnHideAll" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>
      <div class="main">
        <aside class="left">
          <div class="sectionTitle">Toggle conditions</div>
          <div id="legend"></div>
          <div id="hint" class="hint"></div>
        </aside>
        <div id="stage" class="stage">
          <canvas id="canvas"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="tooltip" class="tooltip"></div>
        </div>
      </div>
    </div>
    <script>
      const COLORS={ti:'#60a5fa',neu:'#e5e7eb',to:'#f59e0b'};
      const BAR_GROUPS=[
        {x:1,label:'Vastus medialis'},
        {x:2,label:'Rectus femoris'},
        {x:3,label:'Vastus lateralis'}
      ];
      const MODES={
        means:{
          label:'Mean activation by foot position',
          type:'bar',
          subtitle:'Figure 2 reconstruction of concentric-phase normalized rms EMG by foot position. The paper reports toes in as highest for vastus medialis and vastus lateralis, and toes out as highest for rectus femoris.',
          hint:'These values are figure-based reconstructions from Figure 2, not a published numeric table. Hover any bar to see the estimated NrmsEMG and the study’s significance note.',
          overlay:'Grouped bars = Figure 2 estimated mean NrmsEMG',
          yLabel:'Normalized rms EMG',
          groups:BAR_GROUPS,
          series:[
            {name:'Toes in',key:'ti',color:COLORS.ti,points:[
              {x:1,y:0.88,note:'Highest estimated mean for vastus medialis; significantly greater than neutral.'},
              {x:2,y:0.75,note:'Rectus femoris was lower than toes out in the paper.'},
              {x:3,y:0.86,note:'Highest estimated mean for vastus lateralis; significantly greater than neutral and toes out.'}
            ]},
            {name:'Neutral',key:'neu',color:COLORS.neu,points:[
              {x:1,y:0.81,note:'Intermediate vastus medialis activation.'},
              {x:2,y:0.74,note:'Rectus femoris was lower than toes out in the paper.'},
              {x:3,y:0.80,note:'Vastus lateralis was higher than toes out but lower than toes in.'}
            ]},
            {name:'Toes out',key:'to',color:COLORS.to,points:[
              {x:1,y:0.78,note:'Lowest estimated vastus medialis condition.'},
              {x:2,y:0.80,note:'Highest estimated rectus femoris condition; significantly greater than toes in and neutral.'},
              {x:3,y:0.76,note:'Lowest estimated vastus lateralis condition.'}
            ]}
          ]
        },
        vl:{
          label:'Vastus lateralis across repetitions',
          type:'line',
          subtitle:'Figure 6 reconstruction of average normalized rms EMG across the 8-repetition set for the vastus lateralis.',
          hint:'The study reported similar fatigue trends across foot positions, with all conditions rising over the set. Toes in stayed highest for the vastus lateralis.',
          overlay:'Lines = Figure 6 estimated average NrmsEMG',
          yLabel:'Normalized rms EMG',
          xLabel:'Repetition',
          xValues:[1,2,3,4,5,6,7,8],
          series:[
            {name:'Toes in',key:'ti',color:COLORS.ti,points:[{x:1,y:0.69},{x:2,y:0.72},{x:3,y:0.76},{x:4,y:0.80},{x:5,y:0.84},{x:6,y:0.86},{x:7,y:0.88},{x:8,y:0.91}]},
            {name:'Neutral',key:'neu',color:COLORS.neu,points:[{x:1,y:0.67},{x:2,y:0.72},{x:3,y:0.75},{x:4,y:0.78},{x:5,y:0.82},{x:6,y:0.84},{x:7,y:0.87},{x:8,y:0.90}]},
            {name:'Toes out',key:'to',color:COLORS.to,points:[{x:1,y:0.65},{x:2,y:0.70},{x:3,y:0.73},{x:4,y:0.77},{x:5,y:0.80},{x:6,y:0.83},{x:7,y:0.86},{x:8,y:0.89}]}
          ]
        },
        rf:{
          label:'Rectus femoris across repetitions',
          type:'line',
          subtitle:'Figure 7 reconstruction of average normalized rms EMG across the 8-repetition set for the rectus femoris.',
          hint:'Rectus femoris was the opposite pattern from the vasti: toes out tracked highest through the set, with neutral in the middle and toes in lowest.',
          overlay:'Lines = Figure 7 estimated average NrmsEMG',
          yLabel:'Normalized rms EMG',
          xLabel:'Repetition',
          xValues:[1,2,3,4,5,6,7,8],
          series:[
            {name:'Toes in',key:'ti',color:COLORS.ti,points:[{x:1,y:0.60},{x:2,y:0.65},{x:3,y:0.69},{x:4,y:0.73},{x:5,y:0.76},{x:6,y:0.80},{x:7,y:0.84},{x:8,y:0.88}]},
            {name:'Neutral',key:'neu',color:COLORS.neu,points:[{x:1,y:0.65},{x:2,y:0.69},{x:3,y:0.73},{x:4,y:0.75},{x:5,y:0.80},{x:6,y:0.84},{x:7,y:0.86},{x:8,y:0.90}]},
            {name:'Toes out',key:'to',color:COLORS.to,points:[{x:1,y:0.69},{x:2,y:0.72},{x:3,y:0.76},{x:4,y:0.79},{x:5,y:0.83},{x:6,y:0.85},{x:7,y:0.88},{x:8,y:0.91}]}
          ]
        },
        vm:{
          label:'Vastus medialis across repetitions',
          type:'line',
          subtitle:'Figure 8 reconstruction of average normalized rms EMG across the 8-repetition set for the vastus medialis.',
          hint:'Like the vastus lateralis, the vastus medialis stayed highest with toes in. The paper reported toes in significantly above neutral on the overall condition comparison.',
          overlay:'Lines = Figure 8 estimated average NrmsEMG',
          yLabel:'Normalized rms EMG',
          xLabel:'Repetition',
          xValues:[1,2,3,4,5,6,7,8],
          series:[
            {name:'Toes in',key:'ti',color:COLORS.ti,points:[{x:1,y:0.68},{x:2,y:0.72},{x:3,y:0.76},{x:4,y:0.80},{x:5,y:0.84},{x:6,y:0.86},{x:7,y:0.88},{x:8,y:0.91}]},
            {name:'Neutral',key:'neu',color:COLORS.neu,points:[{x:1,y:0.67},{x:2,y:0.71},{x:3,y:0.74},{x:4,y:0.78},{x:5,y:0.82},{x:6,y:0.85},{x:7,y:0.88},{x:8,y:0.90}]},
            {name:'Toes out',key:'to',color:COLORS.to,points:[{x:1,y:0.65},{x:2,y:0.70},{x:3,y:0.73},{x:4,y:0.77},{x:5,y:0.80},{x:6,y:0.83},{x:7,y:0.86},{x:8,y:0.89}]}
          ]
        }
      };

      const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
      const stage=document.getElementById('stage'),legend=document.getElementById('legend'),hint=document.getElementById('hint'),overlay=document.getElementById('overlay'),subtitle=document.getElementById('subtitle'),tooltip=document.getElementById('tooltip'),status=document.getElementById('status');
      const modeSel=document.getElementById('mode'),btnFit=document.getElementById('btnFit'),btnReset=document.getElementById('btnReset'),btnShowAll=document.getElementById('btnShowAll'),btnHideAll=document.getElementById('btnHideAll');
      let mode='means',visible={ti:true,neu:true,to:true},drag=null,hover=null,view={minX:0,maxX:4,minY:0,maxY:1};

      Object.entries(MODES).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.label;modeSel.appendChild(o);});

      function currentConfig(){ return MODES[mode]; }
      function currentSeries(){ return currentConfig().series.filter(s=>visible[s.key]); }
      function bounds(){
        const cfg=currentConfig();
        const pts=currentSeries().flatMap(s=>s.points);
        if(!pts.length){ return cfg.type==='bar' ? {minX:0.4,maxX:3.6,minY:0,maxY:1} : {minX:1,maxX:8,minY:0.55,maxY:0.95}; }
        const xs=pts.map(p=>p.x);
        const ys=pts.map(p=>p.y);
        const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
        if(cfg.type==='bar'){
          return {minX:minX-0.7,maxX:maxX+0.7,minY:0,maxY:Math.max(1,(maxY*1.18))};
        }
        const yPad=Math.max(0.04,(maxY-minY||0.1)*0.22);
        return {minX:minX-0.45,maxX:maxX+0.45,minY:Math.max(0,minY-yPad),maxY:maxY+yPad};
      }
      function fit(){ view={...bounds()}; draw(); }
      function resize(){ const dpr=window.devicePixelRatio||1, rect=stage.getBoundingClientRect(); canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
      function sx(x,plot){ return plot.x + ((x-view.minX)/(view.maxX-view.minX))*plot.w; }
      function sy(y,plot){ return plot.y + plot.h - ((y-view.minY)/(view.maxY-view.minY))*plot.h; }
      function niceTicks(min,max,target=5){
        const span=max-min||1;
        const rough=span/target;
        const pow=Math.pow(10,Math.floor(Math.log10(Math.abs(rough)||1)));
        const norm=rough/pow;
        const step=(norm<=1?1:norm<=2?2:norm<=5?5:10)*pow;
        const out=[];
        for(let y=Math.floor(min/step)*step;y<=max+step*0.5;y+=step) out.push(Number(y.toFixed(4)));
        return out;
      }
      function xTicks(){
        const cfg=currentConfig();
        if(cfg.type==='bar') return cfg.groups.map(g=>g.x);
        return cfg.xValues.filter(x=>x>=view.minX-0.001&&x<=view.maxX+0.001);
      }
      function drawAxes(plot){
        const cfg=currentConfig();
        ctx.strokeStyle='rgba(255,255,255,0.08)';
        ctx.lineWidth=1;
        ctx.fillStyle='rgba(229,231,235,0.82)';
        ctx.font='12px system-ui';
        ctx.textAlign='left';
        for(const y of niceTicks(view.minY,view.maxY,cfg.type==='bar'?5:6)){
          const py=sy(y,plot);
          ctx.beginPath(); ctx.moveTo(plot.x,py); ctx.lineTo(plot.x+plot.w,py); ctx.stroke();
          ctx.fillText(y.toFixed(cfg.type==='bar'||y<1?2:1).replace(/\.00$/,''),16,py+4);
        }
        ctx.textAlign='center';
        for(const x of xTicks()){
          const px=sx(x,plot);
          ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke();
          const label=cfg.type==='bar' ? (cfg.groups.find(g=>g.x===x)?.label||x) : `${x}`;
          wrapText(label,px,plot.y+plot.h+28,90,14);
        }
        ctx.save();
        ctx.translate(20,plot.y+plot.h/2);
        ctx.rotate(-Math.PI/2);
        ctx.textAlign='center';
        ctx.fillText(cfg.yLabel,0,0);
        ctx.restore();
        ctx.textAlign='center';
        ctx.fillText(cfg.type==='bar'?'Muscle':cfg.xLabel,plot.x+plot.w/2,plot.y+plot.h+62);
      }
      function wrapText(text,x,y,maxWidth,lineHeight){
        const words=text.split(' ');
        let line='', lines=[];
        for(const word of words){
          const test=line?`${line} ${word}`:word;
          if(ctx.measureText(test).width>maxWidth&&line){ lines.push(line); line=word; } else line=test;
        }
        if(line) lines.push(line);
        lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight));
      }
      function draw(){
        const rect=stage.getBoundingClientRect(),w=rect.width,h=rect.height;
        ctx.clearRect(0,0,w,h);
        const plot={x:82,y:20,w:Math.max(120,w-112),h:Math.max(110,h-106)};
        drawAxes(plot);
        const cfg=currentConfig();
        const markers=[];
        if(cfg.type==='bar'){
          const series=currentSeries();
          const spacing=6;
          const baseBar=Math.min(28,Math.max(10,plot.w/(cfg.groups.length*6)));
          const barW=Math.max(8,Math.min(32,baseBar));
          for(const group of cfg.groups){
            const xCenter=sx(group.x,plot);
            const totalW=(barW*series.length)+Math.max(0,series.length-1)*spacing;
            series.forEach((s,idx)=>{
              const point=s.points.find(p=>p.x===group.x);
              if(!point) return;
              const x=xCenter-totalW/2+idx*(barW+spacing);
              const y=sy(point.y,plot);
              const hBar=Math.max(1,plot.y+plot.h-y);
              ctx.fillStyle=s.color;
              ctx.globalAlpha=0.92;
              ctx.fillRect(x,y,barW,hBar);
              ctx.globalAlpha=1;
              ctx.strokeStyle='rgba(255,255,255,0.22)';
              ctx.lineWidth=1.2;
              ctx.strokeRect(x,y,barW,hBar);
              markers.push({shape:'bar',x,y,w:barW,h:hBar,series:s,point,group});
            });
          }
        } else {
          for(const s of currentSeries()){
            ctx.strokeStyle=s.color;
            ctx.lineWidth=3.5;
            ctx.beginPath();
            s.points.forEach((p,i)=>{ const x=sx(p.x,plot), y=sy(p.y,plot); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
            ctx.stroke();
            for(const p of s.points){
              const x=sx(p.x,plot), y=sy(p.y,plot);
              ctx.fillStyle=s.color;
              ctx.beginPath();
              ctx.arc(x,y,5,0,Math.PI*2);
              ctx.fill();
              markers.push({shape:'point',x,y,r:10,series:s,point:p});
            }
          }
        }
        ctx.strokeStyle='rgba(255,255,255,0.18)';
        ctx.beginPath();
        ctx.moveTo(plot.x,plot.y);
        ctx.lineTo(plot.x,plot.y+plot.h);
        ctx.lineTo(plot.x+plot.w,plot.y+plot.h);
        ctx.stroke();
        stage._markers=markers;
        stage._plot=plot;
        status.textContent=cfg.type==='bar' ? `${currentSeries().length} conditions visible` : `${(view.maxX-view.minX).toFixed(1)} rep view`;
      }
      function renderLegend(){
        const cfg=currentConfig();
        subtitle.textContent=cfg.subtitle;
        hint.textContent=cfg.hint;
        overlay.textContent=cfg.overlay;
        legend.innerHTML='';
        for(const s of cfg.series){
          const row=document.createElement('div');
          row.className='check'+(visible[s.key]?' active':'');
          row.innerHTML=`<input type="checkbox" ${visible[s.key]?'checked':''} /><span class="swatch" style="background:${s.color}"></span><label>${s.name}</label>`;
          const box=row.querySelector('input');
          box.addEventListener('change',e=>{ visible[s.key]=e.target.checked; fit(); renderLegend(); });
          row.addEventListener('click',e=>{ if(e.target!==box){ box.checked=!box.checked; visible[s.key]=box.checked; fit(); renderLegend(); } });
          legend.appendChild(row);
        }
      }
      function updateTooltip(ev){
        const rect=stage.getBoundingClientRect(), x=ev.clientX-rect.left, y=ev.clientY-rect.top;
        const hit=(stage._markers||[]).find(m=>m.shape==='bar'
          ? x>=m.x&&x<=m.x+m.w&&y>=m.y&&y<=m.y+m.h
          : Math.hypot(m.x-x,m.y-y)<=m.r);
        if(!hit){ tooltip.style.display='none'; return; }
        const cfg=currentConfig();
        if(cfg.type==='bar'){
          tooltip.innerHTML=`<div><strong>${hit.group.label}</strong></div><div class="muted">${hit.series.name}</div><div>${cfg.yLabel}: <strong>${hit.point.y.toFixed(2)}</strong></div><div>${hit.point.note}</div>`;
        } else {
          const muscle=mode==='vl'?'Vastus lateralis':mode==='rf'?'Rectus femoris':'Vastus medialis';
          tooltip.innerHTML=`<div><strong>${muscle}</strong></div><div class="muted">${hit.series.name} - repetition ${hit.point.x}</div><div>${cfg.yLabel}: <strong>${hit.point.y.toFixed(2)}</strong></div><div>Figure-based reconstruction of the fatigue trend from the paper.</div>`;
        }
        tooltip.style.display='block';
        const tipW=tooltip.offsetWidth||220, tipH=tooltip.offsetHeight||90;
        const left=Math.min(stage.clientWidth-tipW-8,Math.max(8,x+14));
        const top=Math.max(8,(y-tipH-10)>=8?(y-tipH-10):Math.min(stage.clientHeight-tipH-8,y+14));
        tooltip.style.left=`${left}px`;
        tooltip.style.top=`${top}px`;
      }
      function clampView(){
        const b=bounds();
        const spanX=view.maxX-view.minX;
        if(spanX>(b.maxX-b.minX)){ view.minX=b.minX; view.maxX=b.maxX; return; }
        if(view.minX<b.minX){ view.maxX+=b.minX-view.minX; view.minX=b.minX; }
        if(view.maxX>b.maxX){ view.minX-=view.maxX-b.maxX; view.maxX=b.maxX; }
      }

      modeSel.addEventListener('change',e=>{ mode=e.target.value; fit(); renderLegend(); resize(); });
      btnFit.addEventListener('click',fit);
      btnReset.addEventListener('click',()=>{ visible={ti:true,neu:true,to:true}; fit(); renderLegend(); });
      btnShowAll.addEventListener('click',()=>{ visible={ti:true,neu:true,to:true}; fit(); renderLegend(); });
      btnHideAll.addEventListener('click',()=>{ visible={ti:false,neu:false,to:false}; fit(); renderLegend(); });
      stage.addEventListener('wheel',e=>{
        e.preventDefault();
        const cfg=currentConfig();
        const plot=stage._plot||{x:82,w:Math.max(120,stage.clientWidth-112)};
        const xRatio=Math.min(1,Math.max(0,(e.offsetX-plot.x)/Math.max(1,plot.w)));
        const factor=e.deltaY>0?1.12:0.88;
        const span=view.maxX-view.minX;
        const newSpan=Math.max(cfg.type==='bar'?1.2:1.6,Math.min(bounds().maxX-bounds().minX,span*factor));
        const focus=view.minX+span*xRatio;
        view.minX=focus-newSpan*xRatio;
        view.maxX=view.minX+newSpan;
        clampView();
        draw();
      },{passive:false});
      stage.addEventListener('pointerdown',e=>{ drag={x:e.clientX,minX:view.minX,maxX:view.maxX}; stage.classList.add('is-dragging'); stage.setPointerCapture(e.pointerId); });
      stage.addEventListener('pointermove',e=>{
        updateTooltip(e);
        if(!drag) return;
        const plot=stage._plot||{w:stage.clientWidth};
        const span=drag.maxX-drag.minX;
        const pxPerUnit=(plot.w||stage.clientWidth)/Math.max(0.001,span);
        const dx=(e.clientX-drag.x)/pxPerUnit;
        view.minX=drag.minX-dx;
        view.maxX=drag.maxX-dx;
        clampView();
        draw();
        updateTooltip(e);
      });
      stage.addEventListener('pointerup',e=>{ drag=null; stage.classList.remove('is-dragging'); try{stage.releasePointerCapture(e.pointerId);}catch{} });
      stage.addEventListener('pointerleave',()=>tooltip.style.display='none');
      window.addEventListener('resize',resize);

      fit();
      renderLegend();
      resize();
    </script>
  </body>
</html>
