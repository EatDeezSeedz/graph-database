<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gentil 2015 single vs multi-joint elbow flexor training</title>
    <style>
      :root{--bg:#0b0f17;--panel:rgba(17,24,39,.55);--panel2:rgba(15,23,42,.65);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.08);--btn:rgba(255,255,255,.08);--btnHover:rgba(255,255,255,.12)}
      *{box-sizing:border-box} html,body{height:100%;margin:0}
      body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 900px at 20% 10%,rgba(96,165,250,.15),transparent 45%),radial-gradient(900px 700px at 80% 15%,rgba(34,197,94,.12),transparent 45%),var(--bg);color:var(--text);overflow:hidden}
      .wrap{min-height:100dvh;height:100%;display:grid;grid-template-rows:auto 1fr}
      .top{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:blur(12px);align-items:center}
      .title{font-weight:750;font-size:13px}.subtitle{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.35}
      .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .btn,select{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:7px 10px;border-radius:12px;font-weight:650;font-size:12px}.btn{cursor:pointer}.btn:hover{background:var(--btnHover)}
      select,option,optgroup{background:#111827;color:var(--text)} .status{color:var(--muted);font-size:12px;white-space:nowrap}
      .main{display:grid;grid-template-columns:minmax(250px,29vw) 1fr;min-height:0}
      .left{border-right:1px solid var(--border);background:var(--panel2);backdrop-filter:blur(12px);padding:10px 10px 12px;overflow:auto}
      .sectionTitle{font-weight:750;font-size:12px;margin:4px 4px 10px;color:var(--muted)}
      .check{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:14px;margin:8px 4px;background:rgba(0,0,0,.14);cursor:pointer;transition:background 120ms ease,border-color 120ms ease,box-shadow 120ms ease}.check:hover{background:rgba(255,255,255,.05)}.check.active{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
      .swatch{width:12px;height:12px;border-radius:4px;border:1px solid rgba(255,255,255,.25)} .check label{font-size:12px;font-weight:650}
      .hint{margin:8px 4px 0;font-size:12px;color:var(--muted);line-height:1.4}
      .stage{position:relative;overflow:hidden;min-width:0;height:min(48dvh,calc(100dvh - 220px));min-height:290px;touch-action:none;cursor:grab}
      .stage.is-dragging{cursor:grabbing}
      canvas{width:100%;height:100%;display:block}
      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}
      .tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text);font-size:12px;display:none;z-index:20;backdrop-filter:blur(8px)} .tooltip .muted{color:var(--muted);font-weight:650}
      @media (max-width:860px){html,body{height:auto;overflow:auto}body{overflow:auto}.wrap{height:auto;min-height:100vh;grid-template-rows:auto auto}.top{grid-template-columns:1fr}.controls{justify-content:flex-start;gap:6px}.btn,select{padding:6px 9px;font-size:11px}.status{width:100%;white-space:normal}.subtitle,.hint,.overlay{display:none}.main{display:flex;flex-direction:column}.left{border-right:none;border-bottom:1px solid var(--border);order:2;max-height:min(14rem,20dvh);padding-bottom:8px}.check{margin:6px 4px;padding:7px 8px}.stage{order:1;min-height:clamp(250px,46dvh,380px);flex:0 0 auto}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">Gentil et al. (2015) - Single vs multi-joint elbow flexor training</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <select id="mode"></select>
          <button id="btnFit" class="btn">Fit</button>
          <button id="btnReset" class="btn">Reset</button>
          <button id="btnShowAll" class="btn">Show all</button>
          <button id="btnHideAll" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>
      <div class="main">
        <aside class="left">
          <div class="sectionTitle">Toggle groups</div>
          <div id="legend"></div>
          <div id="hint" class="hint"></div>
        </aside>
        <div id="stage" class="stage">
          <canvas id="canvas"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="tooltip" class="tooltip"></div>
        </div>
      </div>
    </div>
    <script>
      const COLORS={mj:'#60a5fa',sj:'#22c55e'};
      const MODES={
        thickness:{label:'Muscle thickness (mm)',subtitle:'Table 2 pre and post elbow flexor muscle thickness after 10 weeks of training.',hint:'Both groups increased muscle thickness similarly: MJ +6.10%, SJ +5.83%.',overlay:'Hover = mean ± SD muscle thickness',yLabel:'Muscle thickness (mm)',categories:['Pre','Post'],series:[{name:'Multi-joint (lat pulldown)',color:COLORS.mj,values:[31.80,33.74],errors:[3.76,3.40],note:'n = 14'},{name:'Single-joint (biceps curl)',color:COLORS.sj,values:[28.79,30.47],errors:[2.76,4.67],note:'n = 15'}]},
        torque:{label:'Peak torque (Nm)',subtitle:'Table 2 concentric elbow-flexor peak torque before and after training.',hint:'Strength gains were also similar: MJ +10.40%, SJ +11.87%.',overlay:'Hover = mean ± SD peak torque',yLabel:'Peak torque (Nm)',categories:['Pre','Post'],series:[{name:'Multi-joint (lat pulldown)',color:COLORS.mj,values:[49.26,54.38],errors:[9.49,10.08],note:'n = 14'},{name:'Single-joint (biceps curl)',color:COLORS.sj,values:[49.69,55.59],errors:[10.50,10.61],note:'n = 15'}]},
        relative:{label:'Relative change (%)',subtitle:'Reported percentage changes over the 10-week intervention.',hint:'This is the clean summary view: both exercise selections produced nearly identical hypertrophy and strength gains.',overlay:'Hover = reported percent change',yLabel:'Change (%)',categories:['Muscle thickness','Peak torque'],series:[{name:'Multi-joint (lat pulldown)',color:COLORS.mj,values:[6.10,10.40],errors:[0,0],note:'Reported delta %'},{name:'Single-joint (biceps curl)',color:COLORS.sj,values:[5.83,11.87],errors:[0,0],note:'Reported delta %'}]}
      };

      const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
      const stage=document.getElementById('stage');
      const legend=document.getElementById('legend');
      const hint=document.getElementById('hint');
      const overlay=document.getElementById('overlay');
      const subtitle=document.getElementById('subtitle');
      const tooltip=document.getElementById('tooltip');
      const status=document.getElementById('status');
      const modeSel=document.getElementById('mode');
      const btnFit=document.getElementById('btnFit');
      const btnReset=document.getElementById('btnReset');
      const btnShowAll=document.getElementById('btnShowAll');
      const btnHideAll=document.getElementById('btnHideAll');

      let mode='thickness';
      let visible={};
      let zoomX=1, panX=0, drag=null, hover=null, activeSeries=null;
      let layout=null;

      Object.entries(MODES).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.label;modeSel.appendChild(o);});

      function initVisible(){ for(const s of MODES[mode].series){ if(!(s.name in visible)) visible[s.name]=true; } }
      function activeSeriesList(){ return MODES[mode].series.filter(s=>visible[s.name]); }
      function maxY(){ const series=activeSeriesList(); const vals=[]; for(const s of series){ for(let i=0;i<s.values.length;i++){ vals.push((s.values[i]||0)+(s.errors?.[i]||0)); } } return Math.max(1, ...vals)*1.18; }
      function resize(){ const dpr=window.devicePixelRatio||1; const rect=stage.getBoundingClientRect(); canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
      function fit(){ zoomX=1; panX=0; draw(); }
      function xWindow(){ const n=MODES[mode].categories.length; const total=Math.max(n/zoomX,1); const maxPan=Math.max(0,n-total); panX=Math.max(0,Math.min(maxPan,panX)); return {start:panX,end:panX+total}; }
      function yTicks(max){ const rough=max/5; const pow=Math.pow(10,Math.floor(Math.log10(rough||1))); const norm=rough/pow; const step=(norm<=1?1:norm<=2?2:norm<=5?5:10)*pow; const out=[]; for(let y=0;y<=max+step*0.5;y+=step) out.push(y); return out; }

      function draw(){
        initVisible();
        const rect=stage.getBoundingClientRect(), w=rect.width, h=rect.height;
        ctx.clearRect(0,0,w,h);
        const pad={l:84,r:26,t:20,b:70};
        const plot={x:pad.l,y:pad.t,w:Math.max(120,w-pad.l-pad.r),h:Math.max(100,h-pad.t-pad.b)};
        const cats=MODES[mode].categories; const vis=activeSeriesList(); const max=maxY(); const ticks=yTicks(max); const win=xWindow();
        layout={plot,catCenters:[],bars:[]};

        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.fillStyle='rgba(229,231,235,0.8)'; ctx.font='12px system-ui';
        for(const tick of ticks){ const y=plot.y+plot.h-(tick/max)*plot.h; ctx.beginPath(); ctx.moveTo(plot.x,y); ctx.lineTo(plot.x+plot.w,y); ctx.stroke(); ctx.fillText(mode==='relative'?`${tick.toFixed(tick<10?1:0)}%`:tick.toFixed(tick<10?1:0), 16, y+4); }
        ctx.save(); ctx.translate(20, plot.y+plot.h/2); ctx.rotate(-Math.PI/2); ctx.fillText(MODES[mode].yLabel, 0, 0); ctx.restore();

        const visibleCount=Math.max(1, win.end-win.start);
        const slotW=plot.w/visibleCount;
        for(let i=0;i<cats.length;i++){
          if(i<win.start||i>win.end) continue;
          const x=plot.x+((i-win.start)+0.5)*slotW;
          layout.catCenters[i]=x;
          ctx.fillStyle='rgba(229,231,235,0.85)'; ctx.textAlign='center'; ctx.fillText(cats[i], x, plot.y+plot.h+28);
        }

        const seriesToDraw=MODES[mode].series.filter(s=>visible[s.name]);
        const groupW=slotW*0.7;
        const barW=Math.min(54, groupW/Math.max(1,seriesToDraw.length));
        for(let i=0;i<cats.length;i++){
          if(i<win.start||i>=win.end) continue;
          const cx=layout.catCenters[i];
          for(let sIdx=0;sIdx<seriesToDraw.length;sIdx++){
            const s=seriesToDraw[sIdx]; const val=s.values[i]; const err=(s.errors?.[i]||0);
            const x=cx-groupW/2+sIdx*barW+(groupW/Math.max(1,seriesToDraw.length)-barW)/2;
            const y=plot.y+plot.h-(Math.max(0,val)/max)*plot.h;
            const hBar=Math.max(2,(Math.max(0,val)/max)*plot.h);
            ctx.fillStyle=(activeSeries&&activeSeries!==s.name)? s.color+'55' : s.color;
            ctx.strokeStyle='rgba(255,255,255,0.22)';
            ctx.lineWidth=1.2;
            ctx.fillRect(x,y,barW,hBar);
            ctx.strokeRect(x,y,barW,hBar);
            if(err>0){
              const ey=plot.y+plot.h-((val+err)/max)*plot.h; const mid=x+barW/2;
              ctx.strokeStyle='rgba(255,255,255,0.65)';
              ctx.beginPath(); ctx.moveTo(mid,ey); ctx.lineTo(mid,y); ctx.moveTo(mid-6,ey); ctx.lineTo(mid+6,ey); ctx.stroke();
            }
            layout.bars.push({x,y,w:barW,h:hBar,series:s.name,color:s.color,value:val,error:err,category:cats[i],note:s.note});
          }
        }

        ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.moveTo(plot.x, plot.y); ctx.lineTo(plot.x, plot.y+plot.h); ctx.lineTo(plot.x+plot.w, plot.y+plot.h); ctx.stroke();
        status.textContent=`${Math.round(zoomX*100)}% zoom`;
      }

      function renderLegend(){
        legend.innerHTML='';
        for(const s of MODES[mode].series){
          const row=document.createElement('div'); row.className='check'+(visible[s.name]?' active':'');
          row.innerHTML=`<input type="checkbox" ${visible[s.name]?'checked':''} /><span class="swatch" style="background:${s.color}"></span><label>${s.name}</label>`;
          const box=row.querySelector('input');
          box.addEventListener('change',e=>{visible[s.name]=e.target.checked; if(activeSeries===s.name&&!visible[s.name]) activeSeries=null; draw(); renderLegend();});
          row.addEventListener('click',e=>{ if(e.target!==box){ activeSeries=activeSeries===s.name?null:s.name; draw(); renderLegend(); }});
          if(activeSeries===s.name) row.classList.add('active');
          legend.appendChild(row);
        }
        const cfg=MODES[mode]; subtitle.textContent=cfg.subtitle; hint.textContent=cfg.hint; overlay.textContent=cfg.overlay;
      }

      function pointerPos(ev){ const r=stage.getBoundingClientRect(); return {x:ev.clientX-r.left,y:ev.clientY-r.top}; }
      function hitBar(p){ if(!layout) return null; return layout.bars.findLast(b=>p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h); }
      function updateTooltip(ev){ const p=pointerPos(ev); const hit=hitBar(p); hover=hit; if(!hit){ tooltip.style.display='none'; return; } tooltip.style.display='block'; tooltip.style.left=`${Math.min(stage.clientWidth-180,p.x+14)}px`; tooltip.style.top=`${Math.max(8,p.y-10)}px`; tooltip.innerHTML=`<div><strong>${hit.series}</strong></div><div class="muted">${hit.category}</div><div>${MODES[mode].yLabel}: <strong>${hit.value.toFixed(2)}</strong>${mode==='relative'?'%':''}</div>${hit.error?`<div>SD: ±${hit.error.toFixed(2)}</div>`:''}<div>${hit.note}</div>`; }

      modeSel.addEventListener('change',e=>{ mode=e.target.value; activeSeries=null; fit(); renderLegend(); resize(); });
      btnFit.addEventListener('click',fit);
      btnReset.addEventListener('click',()=>{ activeSeries=null; fit(); renderLegend(); });
      btnShowAll.addEventListener('click',()=>{ for(const s of MODES[mode].series) visible[s.name]=true; draw(); renderLegend(); });
      btnHideAll.addEventListener('click',()=>{ for(const s of MODES[mode].series) visible[s.name]=false; draw(); renderLegend(); });
      stage.addEventListener('wheel',e=>{ e.preventDefault(); const factor=e.deltaY>0?0.9:1.1; zoomX=Math.max(1,Math.min(3.5,zoomX*factor)); draw(); },{passive:false});
      stage.addEventListener('pointerdown',e=>{ drag={x:e.clientX, panX}; stage.classList.add('is-dragging'); stage.setPointerCapture(e.pointerId); });
      stage.addEventListener('pointermove',e=>{ updateTooltip(e); if(!drag) return; const cats=MODES[mode].categories.length; const span=Math.max(1,cats/zoomX); const pxPerCat=(layout?.plot.w||stage.clientWidth)/span; panX=drag.panX-(e.clientX-drag.x)/Math.max(1,pxPerCat); draw(); updateTooltip(e); });
      stage.addEventListener('pointerup',e=>{ drag=null; stage.classList.remove('is-dragging'); try{stage.releasePointerCapture(e.pointerId);}catch{} });
      stage.addEventListener('pointerleave',()=>{ tooltip.style.display='none'; });
      window.addEventListener('resize',resize);
      renderLegend(); resize();
    </script>
  </body>
</html>
