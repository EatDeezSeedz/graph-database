<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Abboud 2023 lumbar extensor neuromechanical matching</title>
    <style>
      :root{--bg:#0b0f17;--panel:rgba(17,24,39,.55);--panel2:rgba(15,23,42,.66);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.08);--btn:rgba(255,255,255,.08);--btnHover:rgba(255,255,255,.12)}
      *{box-sizing:border-box} html,body{height:100%;margin:0}
      body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 900px at 20% 10%,rgba(96,165,250,.14),transparent 45%),radial-gradient(900px 700px at 80% 15%,rgba(34,197,94,.10),transparent 45%),var(--bg);color:var(--text);overflow:hidden}
      .wrap{min-height:100dvh;height:100%;display:grid;grid-template-rows:auto 1fr}
      .top{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:blur(12px);align-items:center}
      .title{font-weight:750;font-size:13px}
      .subtitle{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.35}
      .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .btn,select{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:7px 10px;border-radius:12px;font-weight:650;font-size:12px}
      .btn{cursor:pointer}.btn:hover{background:var(--btnHover)}
      select,option,optgroup{background:#111827;color:var(--text)}
      .status{color:var(--muted);font-size:12px;white-space:nowrap}
      .main{display:grid;grid-template-columns:minmax(320px,32vw) 1fr;min-height:0}
      .left{border-right:1px solid var(--border);background:var(--panel2);backdrop-filter:blur(12px);padding:10px 10px 12px;overflow:auto}
      .sectionTitle{font-weight:750;font-size:12px;margin:4px 4px 10px;color:var(--muted)}
      .check{display:flex;align-items:flex-start;gap:10px;padding:8px;border:1px solid var(--border);border-radius:14px;margin:8px 4px;background:rgba(0,0,0,.14);cursor:pointer;transition:background 120ms ease,border-color 120ms ease,box-shadow 120ms ease}
      .check:hover{background:rgba(255,255,255,.05)}
      .check.active{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
      .swatch{width:12px;height:12px;border-radius:4px;border:1px solid rgba(255,255,255,.25);margin-top:3px}
      .check label{font-size:12px;font-weight:650}
      .hint{margin:8px 4px 0;font-size:12px;color:var(--muted);line-height:1.45}
      .stage{position:relative;overflow:hidden;min-width:0;height:min(40dvh,calc(100dvh - 230px));min-height:280px;touch-action:none;cursor:grab}
      .stage.is-dragging{cursor:grabbing}
      canvas{width:100%;height:100%;display:block}
      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}
      .tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text);font-size:12px;display:none;z-index:20;backdrop-filter:blur(8px);max-width:330px}
      .tooltip .muted{color:var(--muted);font-weight:650}
      @media (max-width:860px){html,body{height:auto;overflow:auto}body{overflow:auto}.wrap{height:auto;min-height:100vh;grid-template-rows:auto auto}.top{grid-template-columns:1fr}.controls{justify-content:flex-start;gap:6px}.btn,select{padding:6px 9px;font-size:11px}.status{width:100%;white-space:normal}.subtitle,.overlay{display:none}.main{display:flex;flex-direction:column}.left{border-right:none;border-bottom:1px solid var(--border);order:2;max-height:min(18rem,30dvh);padding-bottom:8px}.check{margin:6px 4px;padding:7px 8px}.stage{order:1;min-height:clamp(250px,44dvh,360px);flex:0 0 auto}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">Abboud et al. (2023) - Lumbar extensor neuromechanical matching</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <select id="mode"></select>
          <button id="btnFit" class="btn">Fit</button>
          <button id="btnReset" class="btn">Reset</button>
          <button id="btnShowAll" class="btn">Show all</button>
          <button id="btnHideAll" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>
      <div class="main">
        <aside class="left">
          <div class="sectionTitle">Toggle items</div>
          <div id="legend"></div>
          <div id="hint" class="hint"></div>
        </aside>
        <div id="stage" class="stage">
          <canvas id="canvas"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="tooltip" class="tooltip"></div>
        </div>
      </div>
    </div>
    <script>
      const COLORS={
        baselineActivity:'#60a5fa', responseAmplitude:'#22c55e', mlBaseline:'#a78bfa', mlResponse:'#ec4899', ccBaseline:'#f59e0b', ccResponse:'#ef4444',
        neutral:'#60a5fa', flexion:'#ef4444', rotationLeft:'#22c55e', rotationRight:'#f59e0b',
        multifidus:'#a78bfa', erector:'#60a5fa', cranial:'#22c55e', caudal:'#f59e0b'
      };
      const MODES={
        exact:{
          label:'Exact reported effects',
          type:'bar',
          subtitle:'This mode uses the exact reported ANOVA F-statistics from the paper for baseline activity, perturbation response, and centroid shifts.',
          hint:'These are the exact quantitative results available in the manuscript text. Hover each bar for the precise F-statistic, p-value, and reported post-hoc direction.',
          overlay:'Exact values from the accepted manuscript text',
          yLabel:'F statistic',
          items:[
            {key:'baselineActivity',label:'Baseline activity',value:110.99,note:'Posture effect: F(2,36)=110.99, p<0.001. Flexion > Neutral and Rotation; Neutral = Rotation.'},
            {key:'responseAmplitude',label:'Perturbation response',value:4.30,note:'Side × Posture effect: F(2,36)=4.30, p=0.021. Flexion responses were higher than right rotation, especially on the right.'},
            {key:'mlBaseline',label:'ML centroid baseline',value:17.36,note:'Posture effect: F(2,36)=17.36, p<0.001. Flexion centroid was more medial than Neutral and Rotation at baseline.'},
            {key:'mlResponse',label:'ML centroid response',value:8.55,note:'Side × Posture effect: F(2,36)=8.55, p<0.001. Neutral was more medial, while flexion and left rotation shifted laterally in response to perturbation.'},
            {key:'ccBaseline',label:'CC centroid baseline',value:14.30,note:'Side × Posture effect: F(2,36)=14.30, p<0.001. Rotation put the left side more cranial and the right side more caudal.'},
            {key:'ccResponse',label:'CC centroid response',value:7.18,note:'Side × Posture effect: F(2,36)=7.18, p=0.002. Rotation again produced a more cranial centroid on the left than the right.'}
          ]
        },
        medialLateral:{
          label:'Medio-lateral centroid summary',
          type:'grouped',
          subtitle:'Study-based directional summary of the medio-lateral centroid findings. Positive values = more medial; negative values = more lateral. These are qualitative position classes, not raw coordinates.',
          hint:'This view shows the actual directional story from the paper: flexion is more medial at baseline, but flexion and left-rotation responses shift laterally when the perturbation hits.',
          overlay:'Directional summary from reported comparisons',
          yLabel:'Relative centroid position',
          groups:[
            {name:'Baseline',values:{neutral:0.2,flexion:1.0,rotationLeft:-0.1,rotationRight:0.1}},
            {name:'Perturbation response',values:{neutral:0.8,flexion:-0.8,rotationLeft:-1.0,rotationRight:0.3}}
          ],
          notes:{
            neutral:'Neutral posture served as the more medial comparison state in response to perturbation.',
            flexion:'Flexion was more medial at baseline but shifted laterally in response to the perturbation.',
            rotationLeft:'On the left side during rotation, the centroid shifted laterally compared with neutral in response to perturbation.',
            rotationRight:'The right side during rotation was the least responsive condition for amplitude and stayed relatively more medial than the left rotation response.'}
        },
        cranialCaudal:{
          label:'Cranio-caudal centroid summary',
          type:'grouped',
          subtitle:'Study-based directional summary of the cranio-caudal centroid findings. Positive values = more cranial; negative values = more caudal. These are qualitative position classes, not raw coordinates.',
          hint:'Rotation created the key asymmetry here: the left side moved cranially while the right side sat more caudally, both at baseline and after perturbation.',
          overlay:'Directional summary from reported comparisons',
          yLabel:'Relative centroid position',
          groups:[
            {name:'Baseline',values:{neutral:0.0,flexion:-0.4,rotationLeft:1.0,rotationRight:-1.0}},
            {name:'Perturbation response',values:{neutral:0.0,flexion:-0.2,rotationLeft:0.9,rotationRight:-0.1}}
          ],
          notes:{
            neutral:'Neutral stayed around the middle cranio-caudal position.',
            flexion:'Flexion was not the main cranio-caudal effect; its key story was medial baseline and lateral perturbation response.',
            rotationLeft:'Left rotation produced the most cranial centroid location at baseline and after perturbation.',
            rotationRight:'Right-side rotation was more caudal at baseline than neutral and than the left side.'}
        },
        interpretation:{
          label:'NMM interpretation',
          type:'scatter',
          subtitle:'Interpretive neuromechanical matching summary from the paper’s discussion. This view shows which lumbar regions/postural strategies were favored when their presumed mechanical advantage improved.',
          hint:'The paper’s main interpretation was: medial stabilizers contribute more in flexion baseline, lateral erector spinae contribute more to resist perturbation in flexion, and cranial ipsilateral regions are favored during rotation.',
          overlay:'Interpretive summary based on the discussion',
          xLabel:'Presumed mechanical advantage',
          yLabel:'Observed recruitment strength',
          points:[
            {key:'multifidus',label:'Medial stabilizers / superficial multifidus in flexion baseline',x:68,y:78,note:'The authors interpret the medial baseline shift in flexion as greater contribution of medial stabilizing regions, likely superficial multifidus.'},
            {key:'erector',label:'Lateral erector spinae in flexion perturbation response',x:80,y:84,note:'The lateral shift during flexion perturbation was interpreted as greater recruitment of erector spinae regions with larger moment arms to resist the perturbation.'},
            {key:'cranial',label:'Cranial left-side regions in rotated posture',x:74,y:76,note:'During left rotation, more cranial left-side regions were favored, consistent with better leverage for countering the forward perturbation.'},
            {key:'caudal',label:'Caudal right-side regions in rotated posture',x:34,y:42,note:'The right side in rotation shifted more caudally, suggesting a less mechanically favorable configuration for opposing the perturbation.'}
          ]
        }
      };

      const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
      const stage=document.getElementById('stage'),legend=document.getElementById('legend'),hint=document.getElementById('hint'),overlay=document.getElementById('overlay'),subtitle=document.getElementById('subtitle'),tooltip=document.getElementById('tooltip'),status=document.getElementById('status');
      const modeSel=document.getElementById('mode'),btnFit=document.getElementById('btnFit'),btnReset=document.getElementById('btnReset'),btnShowAll=document.getElementById('btnShowAll'),btnHideAll=document.getElementById('btnHideAll');
      let mode='exact',visible={},drag=null,view={minX:0,maxX:10,minY:0,maxY:120};
      Object.keys(COLORS).forEach(k=>visible[k]=true);
      Object.entries(MODES).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.label;modeSel.appendChild(o);});
      const cfg=()=>MODES[mode];
      function activeItems(){ if(cfg().type==='bar') return cfg().items.filter(i=>visible[i.key]); if(cfg().type==='grouped') return Object.keys(cfg().groups[0].values).filter(k=>visible[k]); return cfg().points.filter(p=>visible[p.key]); }
      function bounds(){ if(cfg().type==='bar'){ return {minX:0.4,maxX:Math.max(1.6,cfg().items.length+0.6),minY:0,maxY:Math.max(120,...cfg().items.map(i=>i.value))*1.08}; } if(cfg().type==='grouped'){ return {minX:0.4,maxX:cfg().groups.length+0.6,minY:-1.4,maxY:1.4}; } const pts=activeItems(); if(!pts.length) return {minX:0,maxX:100,minY:0,maxY:100}; return {minX:0,maxX:100,minY:0,maxY:100}; }
      function fit(){ view={...bounds()}; draw(); }
      function resize(){ const dpr=window.devicePixelRatio||1, rect=stage.getBoundingClientRect(); canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
      const sx=(x,p)=>p.x+((x-view.minX)/(view.maxX-view.minX))*p.w;
      const sy=(y,p)=>p.y+p.h-((y-view.minY)/(view.maxY-view.minY))*p.h;
      function niceTicks(min,max,target=5){ const span=Math.max(0.0001,max-min), rough=span/target, pow=Math.pow(10,Math.floor(Math.log10(Math.abs(rough)||1))), norm=rough/pow, step=(norm<=1?1:norm<=2?2:norm<=5?5:10)*pow, out=[]; for(let y=Math.floor(min/step)*step;y<=max+step*0.5;y+=step) out.push(Number(y.toFixed(4))); return out; }
      function wrapText(text,x,y,maxWidth,lineHeight){ const words=String(text).split(' '); let line='', lines=[]; for(const word of words){ const test=line?`${line} ${word}`:word; if(ctx.measureText(test).width>maxWidth&&line){ lines.push(line); line=word; } else line=test; } if(line) lines.push(line); lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight)); }
      function drawAxes(plot){
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.fillStyle='rgba(229,231,235,0.82)'; ctx.font='12px system-ui'; ctx.textAlign='left';
        for(const y of niceTicks(view.minY,view.maxY,5)){ const py=sy(y,plot); ctx.beginPath(); ctx.moveTo(plot.x,py); ctx.lineTo(plot.x+plot.w,py); ctx.stroke(); ctx.fillText((Math.abs(y)<1e-6?0:Number(y.toFixed(1))).toString(),16,py+4); }
        ctx.textAlign='center';
        if(cfg().type==='bar'){ cfg().items.forEach((item,idx)=>{ const px=sx(idx+1,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); wrapText(item.label,px,plot.y+plot.h+28,100,14); }); ctx.fillText('Effect',plot.x+plot.w/2,plot.y+plot.h+56); }
        else if(cfg().type==='grouped'){ cfg().groups.forEach((group,idx)=>{ const px=sx(idx+1,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); wrapText(group.name,px,plot.y+plot.h+28,110,14); }); ctx.fillText('Condition',plot.x+plot.w/2,plot.y+plot.h+56); }
        else { for(const x of niceTicks(view.minX,view.maxX,5)){ const px=sx(x,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); ctx.fillText(x.toFixed(0),px,plot.y+plot.h+28); } ctx.fillText(cfg().xLabel,plot.x+plot.w/2,plot.y+plot.h+56); }
        ctx.save(); ctx.translate(20,plot.y+plot.h/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillText(cfg().yLabel,0,0); ctx.restore();
      }
      function draw(){ const rect=stage.getBoundingClientRect(),w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h); const plot={x:82,y:20,w:Math.max(120,w-112),h:Math.max(110,h-108)}; drawAxes(plot); const markers=[]; if(cfg().type==='bar'){ const shown=cfg().items.filter(i=>visible[i.key]); const barW=Math.max(18,Math.min(40,plot.w/(Math.max(3,shown.length)*1.6))); shown.forEach((item,idx)=>{ const center=sx(cfg().items.indexOf(item)+1,plot); const y=sy(item.value,plot), zeroY=sy(0,plot), top=Math.min(y,zeroY), height=Math.max(1,Math.abs(zeroY-y)), x=center-barW/2; ctx.fillStyle=COLORS[item.key]; ctx.globalAlpha=.92; ctx.fillRect(x,top,barW,height); ctx.globalAlpha=1; ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.strokeRect(x,top,barW,height); markers.push({shape:'bar',x,top,w:barW,h:height,item}); }); status.textContent=`${shown.length} effects visible`; }
        else if(cfg().type==='grouped'){ const shown=activeItems(); const barW=Math.max(12,Math.min(30,plot.w/(cfg().groups.length*Math.max(3,shown.length)*1.45))); cfg().groups.forEach((group,groupIdx)=>{ const totalW=shown.length*barW+(shown.length-1)*8; shown.forEach((key,itemIdx)=>{ const center=sx(groupIdx+1,plot)-totalW/2+itemIdx*(barW+8)+barW/2; const value=group.values[key]??0; const y=sy(value,plot), zeroY=sy(0,plot), top=Math.min(y,zeroY), height=Math.max(1,Math.abs(zeroY-y)), x=center-barW/2; ctx.fillStyle=COLORS[key]; ctx.globalAlpha=.92; ctx.fillRect(x,top,barW,height); ctx.globalAlpha=1; ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.strokeRect(x,top,barW,height); markers.push({shape:'bar',x,top,w:barW,h:height,key,group:group.name,value}); }); }); status.textContent=`${shown.length} series visible`; }
        else { const pts=activeItems(); if(pts.length>1){ ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.setLineDash([5,4]); ctx.beginPath(); pts.forEach((p,i)=>{ const x=sx(p.x,plot), y=sy(p.y,plot); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke(); ctx.setLineDash([]); } pts.forEach(p=>{ const x=sx(p.x,plot), y=sy(p.y,plot); ctx.fillStyle=COLORS[p.key]; ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.24)'; ctx.stroke(); ctx.fillStyle='rgba(229,231,235,.88)'; ctx.textAlign='left'; ctx.font='11px system-ui'; wrapText(p.label,x+12,y-8,170,13); markers.push({shape:'point',x,y,r:12,item:p}); }); status.textContent=`${pts.length} regions visible`; }
        ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.moveTo(plot.x,plot.y); ctx.lineTo(plot.x,plot.y+plot.h); ctx.lineTo(plot.x+plot.w,plot.y+plot.h); ctx.stroke(); stage._markers=markers; stage._plot=plot; }
      function legendItems(){ if(cfg().type==='bar') return cfg().items.map(i=>({key:i.key,label:i.label,note:i.note})); if(cfg().type==='grouped'){ return [ {key:'neutral',label:'Neutral posture',note:cfg().notes.neutral}, {key:'flexion',label:'Flexion posture',note:cfg().notes.flexion}, {key:'rotationLeft',label:'Rotation posture - left side',note:cfg().notes.rotationLeft}, {key:'rotationRight',label:'Rotation posture - right side',note:cfg().notes.rotationRight} ]; } return cfg().points.map(p=>({key:p.key,label:p.label,note:p.note})); }
      function renderLegend(){ subtitle.textContent=cfg().subtitle; hint.textContent=cfg().hint; overlay.textContent=cfg().overlay; legend.innerHTML=''; legendItems().forEach(entry=>{ const row=document.createElement('div'); row.className='check'+(visible[entry.key]?' active':''); row.innerHTML=`<input type="checkbox" ${visible[entry.key]?'checked':''} /><span class="swatch" style="background:${COLORS[entry.key]}"></span><div><label>${entry.label}</label><div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.35">${entry.note}</div></div>`; const box=row.querySelector('input'); box.addEventListener('change',e=>{ visible[entry.key]=e.target.checked; draw(); renderLegend(); }); row.addEventListener('click',e=>{ if(e.target!==box){ box.checked=!box.checked; visible[entry.key]=box.checked; draw(); renderLegend(); }}); legend.appendChild(row); }); }
      function updateTooltip(ev){ const rect=stage.getBoundingClientRect(),x=ev.clientX-rect.left,y=ev.clientY-rect.top; const hit=(stage._markers||[]).find(m=>m.shape==='point'?Math.hypot(m.x-x,m.y-y)<=m.r:(x>=m.x&&x<=m.x+m.w&&y>=m.top&&y<=m.top+m.h)); if(!hit){ tooltip.style.display='none'; return; } let html=''; if(cfg().type==='bar'){ const item=hit.item; html=`<div><strong>${item.label}</strong></div><div class="muted">Exact reported effect</div><div>F statistic: <strong>${item.value.toFixed(2)}</strong></div><div>${item.note}</div>`; } else if(cfg().type==='grouped'){ const label={neutral:'Neutral posture',flexion:'Flexion posture',rotationLeft:'Rotation posture - left side',rotationRight:'Rotation posture - right side'}[hit.key]; const note=cfg().notes[hit.key]; html=`<div><strong>${label}</strong></div><div class="muted">${hit.group}</div><div>Directional score: <strong>${hit.value.toFixed(1)}</strong></div><div>${note}</div>`; } else { const item=hit.item; html=`<div><strong>${item.label}</strong></div><div class="muted">Interpretive neuromechanical summary</div><div>Mechanical advantage: <strong>${item.x}</strong></div><div>Recruitment strength: <strong>${item.y}</strong></div><div>${item.note}</div>`; } tooltip.innerHTML=html; tooltip.style.display='block'; const tipW=tooltip.offsetWidth||240, tipH=tooltip.offsetHeight||100; const left=Math.min(stage.clientWidth-tipW-8,Math.max(8,x+14)); const top=Math.max(8,(y-tipH-10)>=8?(y-tipH-10):Math.min(stage.clientHeight-tipH-8,y+14)); tooltip.style.left=`${left}px`; tooltip.style.top=`${top}px`; }
      function clampView(){ const b=bounds(), spanX=view.maxX-view.minX; if(spanX>(b.maxX-b.minX)){ view.minX=b.minX; view.maxX=b.maxX; return; } if(view.minX<b.minX){ view.maxX+=b.minX-view.minX; view.minX=b.minX; } if(view.maxX>b.maxX){ view.minX-=view.maxX-b.maxX; view.maxX=b.maxX; } }
      modeSel.addEventListener('change',e=>{ mode=e.target.value; fit(); renderLegend(); resize(); });
      btnFit.addEventListener('click',fit);
      btnReset.addEventListener('click',()=>{ Object.keys(visible).forEach(k=>visible[k]=true); fit(); renderLegend(); });
      btnShowAll.addEventListener('click',()=>{ legendItems().forEach(i=>visible[i.key]=true); draw(); renderLegend(); });
      btnHideAll.addEventListener('click',()=>{ legendItems().forEach(i=>visible[i.key]=false); draw(); renderLegend(); });
      stage.addEventListener('wheel',e=>{ e.preventDefault(); const plot=stage._plot||{x:82,w:Math.max(120,stage.clientWidth-112)}; const xRatio=Math.min(1,Math.max(0,(e.offsetX-plot.x)/Math.max(1,plot.w))); const factor=e.deltaY>0?1.12:0.88; const span=view.maxX-view.minX; const b=bounds(); const newSpan=Math.max(1.1,Math.min(b.maxX-b.minX,span*factor)); const focus=view.minX+span*xRatio; view.minX=focus-newSpan*xRatio; view.maxX=view.minX+newSpan; clampView(); draw(); },{passive:false});
      stage.addEventListener('pointerdown',e=>{ drag={x:e.clientX,minX:view.minX,maxX:view.maxX}; stage.classList.add('is-dragging'); stage.setPointerCapture(e.pointerId); });
      stage.addEventListener('pointermove',e=>{ updateTooltip(e); if(!drag) return; const plot=stage._plot||{w:stage.clientWidth}; const span=drag.maxX-drag.minX, pxPerUnit=(plot.w||stage.clientWidth)/Math.max(0.001,span), dx=(e.clientX-drag.x)/pxPerUnit; view.minX=drag.minX-dx; view.maxX=drag.maxX-dx; clampView(); draw(); updateTooltip(e); });
      stage.addEventListener('pointerup',e=>{ drag=null; stage.classList.remove('is-dragging'); try{stage.releasePointerCapture(e.pointerId);}catch{} });
      stage.addEventListener('pointerleave',()=>tooltip.style.display='none');
      window.addEventListener('resize',resize);
      fit(); renderLegend(); resize();
    </script>
  </body>
</html>
