<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hudson 2007 scalene and sternomastoid neuromechanical matching</title>
    <style>
      :root{--bg:#0b0f17;--panel:rgba(17,24,39,.55);--panel2:rgba(15,23,42,.66);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.08);--btn:rgba(255,255,255,.08);--btnHover:rgba(255,255,255,.12)}
      *{box-sizing:border-box} html,body{height:100%;margin:0}
      body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 900px at 20% 10%,rgba(96,165,250,.14),transparent 45%),radial-gradient(900px 700px at 80% 15%,rgba(34,197,94,.10),transparent 45%),var(--bg);color:var(--text);overflow:hidden}
      .wrap{min-height:100dvh;height:100%;display:grid;grid-template-rows:auto 1fr}
      .top{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:blur(12px);align-items:center}
      .title{font-weight:750;font-size:13px}
      .subtitle{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.35}
      .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .btn,select{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:7px 10px;border-radius:12px;font-weight:650;font-size:12px}
      .btn{cursor:pointer}.btn:hover{background:var(--btnHover)}
      select,option,optgroup{background:#111827;color:var(--text)}
      .status{color:var(--muted);font-size:12px;white-space:nowrap}
      .main{display:grid;grid-template-columns:minmax(280px,30vw) 1fr;min-height:0}
      .left{border-right:1px solid var(--border);background:var(--panel2);backdrop-filter:blur(12px);padding:10px 10px 12px;overflow:auto}
      .sectionTitle{font-weight:750;font-size:12px;margin:4px 4px 10px;color:var(--muted)}
      .check{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);border-radius:14px;margin:8px 4px;background:rgba(0,0,0,.14);cursor:pointer;transition:background 120ms ease,border-color 120ms ease,box-shadow 120ms ease}
      .check:hover{background:rgba(255,255,255,.05)}
      .check.active{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
      .swatch{width:12px;height:12px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
      .check label{font-size:12px;font-weight:650}
      .hint{margin:8px 4px 0;font-size:12px;color:var(--muted);line-height:1.45}
      .stage{position:relative;overflow:hidden;min-width:0;height:min(40dvh,calc(100dvh - 230px));min-height:270px;touch-action:none;cursor:grab}
      .stage.is-dragging{cursor:grabbing}
      canvas{width:100%;height:100%;display:block}
      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}
      .tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,.82);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text);font-size:12px;display:none;z-index:20;backdrop-filter:blur(8px);max-width:270px}
      .tooltip .muted{color:var(--muted);font-weight:650}
      @media (max-width:860px){html,body{height:auto;overflow:auto}body{overflow:auto}.wrap{height:auto;min-height:100vh;grid-template-rows:auto auto}.top{grid-template-columns:1fr}.controls{justify-content:flex-start;gap:6px}.btn,select{padding:6px 9px;font-size:11px}.status{width:100%;white-space:normal}.subtitle,.overlay{display:none}.main{display:flex;flex-direction:column}.left{border-right:none;border-bottom:1px solid var(--border);order:2;max-height:min(16rem,24dvh);padding-bottom:8px}.check{margin:6px 4px;padding:7px 8px}.stage{order:1;min-height:clamp(250px,44dvh,360px);flex:0 0 auto}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">Hudson et al. (2007) - Scalene and sternomastoid neuromechanical matching</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <select id="mode"></select>
          <button id="btnFit" class="btn">Fit</button>
          <button id="btnReset" class="btn">Reset</button>
          <button id="btnShowAll" class="btn">Show all</button>
          <button id="btnHideAll" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>
      <div class="main">
        <aside class="left">
          <div class="sectionTitle">Toggle muscles / conditions</div>
          <div id="legend"></div>
          <div id="hint" class="hint"></div>
        </aside>
        <div id="stage" class="stage">
          <canvas id="canvas"></canvas>
          <div id="overlay" class="overlay"></div>
          <div id="tooltip" class="tooltip"></div>
        </div>
      </div>
    </div>
    <script>
      const SERIES_COLORS={
        scalene:'#60a5fa',
        sternomastoid:'#ef4444',
        frc:'#60a5fa',
        frctv:'#22c55e',
        tlc:'#f59e0b'
      };
      const MODES={
        activation:{
          label:'Activation / neural drive',
          type:'line',
          subtitle:'Figure-based reconstruction of the normalized activation profiles during static inspiratory ramps. Scalene activates earlier and more strongly across most of the effort range.',
          hint:'This view shows the main task result: scalene is recruited early and rises quickly, while sternomastoid is delayed and ramps up later.',
          overlay:'Lines = study-based reconstruction from Figure 5',
          xLabel:'Inspiratory effort (% MIP)',
          yLabel:'Normalized EMG (% of max)',
          items:[
            {key:'scalene',name:'Scalene',note:'Scalene was recruited early, increased with pressure, and plateaued near 80% MIP.',points:[[0,8],[20,34],[40,60],[60,82],[80,96],[100,97]]},
            {key:'sternomastoid',name:'Sternomastoid',note:'Sternomastoid recruitment was delayed until after about 20% MIP, then increased through 100% MIP.',points:[[0,0],[20,4],[40,22],[60,48],[80,73],[100,92]]}
          ]
        },
        leverage:{
          label:'Mechanical advantage / leverage',
          type:'bar',
          subtitle:'Exact mechanical-advantage values cited in the paper. Scalenes had greater inspiratory leverage than sternomastoid.',
          hint:'This is the mechanical side of the matching argument: scalenes had the better inspiratory leverage, and they were also the more strongly activated muscle.',
          overlay:'Bars = mechanical advantage (% l⁻¹)',
          yLabel:'Mechanical advantage (% l⁻¹)',
          items:[
            {key:'scalene',name:'Scalene',value:3.4,note:'Quoted directly in the paper from prior human respiratory-muscle leverage work.'},
            {key:'sternomastoid',name:'Sternomastoid',value:2.0,note:'Quoted directly in the paper; lower inspiratory leverage than scalene.'}
          ]
        },
        volumes:{
          label:'Lung-volume effect',
          type:'bar',
          subtitle:'Normalized sternomastoid:scalene activation distribution across starting lung volumes. The paper reported no significant change across FRC, FRC + tidal volume, and TLC.',
          hint:'This view is about invariance: even though lung volume and feedback changed, the relative distribution of activation did not.',
          overlay:'Bars = normalized sternomastoid:scalene ratio (study conclusion)',
          yLabel:'Normalized relative activation (%)',
          items:[
            {key:'frc',name:'FRC',value:100,note:'Reference condition. Relative activation pattern between sternomastoid and scalene.'},
            {key:'frctv',name:'FRC + tidal volume',value:100,note:'No significant change versus FRC in the sternomastoid:scalene EMG ratio.'},
            {key:'tlc',name:'TLC',value:100,note:'No significant change versus the lower lung volumes in the sternomastoid:scalene EMG ratio.'}
          ]
        }
      };

      const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
      const stage=document.getElementById('stage'),legend=document.getElementById('legend'),hint=document.getElementById('hint'),overlay=document.getElementById('overlay'),subtitle=document.getElementById('subtitle'),tooltip=document.getElementById('tooltip'),status=document.getElementById('status');
      const modeSel=document.getElementById('mode'),btnFit=document.getElementById('btnFit'),btnReset=document.getElementById('btnReset'),btnShowAll=document.getElementById('btnShowAll'),btnHideAll=document.getElementById('btnHideAll');
      let mode='activation', visible={}, drag=null, view={minX:0,maxX:100,minY:0,maxY:100};
      Object.keys(MODES).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=MODES[k].label;modeSel.appendChild(o);});

      function currentCfg(){ return MODES[mode]; }
      function currentItems(){ return currentCfg().items.filter(item=>visible[item.key]); }
      function resetVisible(){ currentCfg().items.forEach(item=>visible[item.key]=true); }
      resetVisible();

      function bounds(){
        const cfg=currentCfg(), items=currentItems();
        if(cfg.type==='line'){
          if(!items.length) return {minX:0,maxX:100,minY:0,maxY:100};
          const allX=items.flatMap(item=>item.points.map(p=>p[0]));
          const allY=items.flatMap(item=>item.points.map(p=>p[1]));
          return {minX:Math.min(...allX),maxX:Math.max(...allX),minY:0,maxY:Math.max(...allY)*1.12};
        }
        if(!items.length) return {minX:0.4,maxX:3.6,minY:0,maxY:110};
        const vals=items.map(i=>i.value);
        return {minX:0.4,maxX:items.length+0.6,minY:0,maxY:Math.max(...vals)*1.14};
      }

      function fit(){ view={...bounds()}; draw(); }
      function resize(){ const dpr=window.devicePixelRatio||1, rect=stage.getBoundingClientRect(); canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
      const sx=(x,p)=>p.x+((x-view.minX)/(view.maxX-view.minX))*p.w;
      const sy=(y,p)=>p.y+p.h-((y-view.minY)/(view.maxY-view.minY))*p.h;
      function niceTicks(min,max,target=5){ const span=max-min||1, rough=span/target, pow=Math.pow(10,Math.floor(Math.log10(Math.abs(rough)||1))), norm=rough/pow, step=(norm<=1?1:norm<=2?2:norm<=5?5:10)*pow, out=[]; for(let y=Math.floor(min/step)*step;y<=max+step*0.5;y+=step) out.push(Number(y.toFixed(4))); return out; }
      function wrapText(text,x,y,maxWidth,lineHeight){ const words=String(text).split(' '); let line='', lines=[]; for(const word of words){ const test=line?`${line} ${word}`:word; if(ctx.measureText(test).width>maxWidth&&line){ lines.push(line); line=word; } else line=test; } if(line) lines.push(line); lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight)); }

      function drawAxes(plot){
        const cfg=currentCfg();
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.fillStyle='rgba(229,231,235,0.82)'; ctx.font='12px system-ui'; ctx.textAlign='left';
        for(const y of niceTicks(view.minY,view.maxY,5)){ const py=sy(y,plot); ctx.beginPath(); ctx.moveTo(plot.x,py); ctx.lineTo(plot.x+plot.w,py); ctx.stroke(); ctx.fillText(y.toFixed(Math.abs(y)>=10?0:1).replace(/\.0$/,''),16,py+4); }
        ctx.textAlign='center';
        if(cfg.type==='line'){
          for(const x of niceTicks(view.minX,view.maxX,5)){ const px=sx(x,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); ctx.fillText(x.toFixed(0),px,plot.y+plot.h+28); }
          ctx.fillText(cfg.xLabel,plot.x+plot.w/2,plot.y+plot.h+54);
        } else {
          currentCfg().items.forEach((item,idx)=>{ const px=sx(idx+1,plot); ctx.beginPath(); ctx.moveTo(px,plot.y); ctx.lineTo(px,plot.y+plot.h); ctx.stroke(); wrapText(item.name,px,plot.y+plot.h+28,92,14); });
          ctx.fillText(mode==='volumes'?'Starting lung volume':'Muscle',plot.x+plot.w/2,plot.y+plot.h+54);
        }
        ctx.save(); ctx.translate(20,plot.y+plot.h/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillText(cfg.yLabel,0,0); ctx.restore();
      }

      function draw(){
        const rect=stage.getBoundingClientRect(), w=rect.width, h=rect.height; ctx.clearRect(0,0,w,h);
        const plot={x:82,y:20,w:Math.max(120,w-112),h:Math.max(110,h-106)};
        drawAxes(plot);
        const cfg=currentCfg(), items=currentItems(), markers=[];
        if(cfg.type==='line'){
          items.forEach(item=>{
            const color=SERIES_COLORS[item.key];
            ctx.strokeStyle=color; ctx.lineWidth=4; ctx.beginPath();
            item.points.forEach((pt,idx)=>{ const x=sx(pt[0],plot), y=sy(pt[1],plot); if(idx===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); markers.push({shape:'point',x,y,r:10,item,point:pt}); });
            ctx.stroke();
            item.points.forEach(pt=>{ const x=sx(pt[0],plot), y=sy(pt[1],plot); ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill(); });
          });
        } else {
          const barW=Math.max(18,Math.min(64,Math.max(18,plot.w/(Math.max(1,cfg.items.length)*2.2))));
          items.forEach(item=>{
            const idx=cfg.items.findIndex(i=>i.key===item.key)+1;
            const xCenter=sx(idx,plot), y=sy(item.value,plot), zeroY=sy(0,plot), top=Math.min(y,zeroY), hBar=Math.max(1,Math.abs(zeroY-y)), x=xCenter-barW/2;
            const color=SERIES_COLORS[item.key];
            ctx.fillStyle=color; ctx.globalAlpha=.92; ctx.fillRect(x,top,barW,hBar); ctx.globalAlpha=1;
            ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1.2; ctx.strokeRect(x,top,barW,hBar);
            markers.push({shape:'bar',x,top,w:barW,h:hBar,item});
          });
        }
        ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.moveTo(plot.x,plot.y); ctx.lineTo(plot.x,plot.y+plot.h); ctx.lineTo(plot.x+plot.w,plot.y+plot.h); ctx.stroke();
        stage._markers=markers; stage._plot=plot; status.textContent=`${items.length} visible`;
      }

      function renderLegend(){
        const cfg=currentCfg();
        subtitle.textContent=cfg.subtitle; hint.textContent=cfg.hint; overlay.textContent=cfg.overlay; legend.innerHTML='';
        cfg.items.forEach(item=>{
          const row=document.createElement('div');
          row.className='check'+(visible[item.key]?' active':'');
          row.innerHTML=`<input type="checkbox" ${visible[item.key]?'checked':''} /><span class="swatch" style="background:${SERIES_COLORS[item.key]}"></span><label>${item.name}</label>`;
          const box=row.querySelector('input');
          box.addEventListener('change',e=>{ visible[item.key]=e.target.checked; fit(); renderLegend(); });
          row.addEventListener('click',e=>{ if(e.target!==box){ box.checked=!box.checked; visible[item.key]=box.checked; fit(); renderLegend(); }});
          legend.appendChild(row);
        });
      }

      function updateTooltip(ev){
        const rect=stage.getBoundingClientRect(), x=ev.clientX-rect.left, y=ev.clientY-rect.top;
        const hit=(stage._markers||[]).find(m=>m.shape==='bar'?(x>=m.x&&x<=m.x+m.w&&y>=m.top&&y<=m.top+m.h):Math.hypot(m.x-x,m.y-y)<=m.r);
        if(!hit){ tooltip.style.display='none'; return; }
        const cfg=currentCfg(), item=hit.item;
        if(cfg.type==='line'){
          tooltip.innerHTML=`<div><strong>${item.name}</strong></div><div class="muted">${cfg.label}</div><div>${cfg.xLabel}: <strong>${hit.point[0]}%</strong></div><div>${cfg.yLabel}: <strong>${hit.point[1].toFixed(0)}%</strong></div><div>${item.note}</div>`;
        } else {
          tooltip.innerHTML=`<div><strong>${item.name}</strong></div><div class="muted">${cfg.label}</div><div>${cfg.yLabel}: <strong>${item.value.toFixed(1)}</strong></div><div>${item.note}</div>`;
        }
        tooltip.style.display='block';
        const tipW=tooltip.offsetWidth||220, tipH=tooltip.offsetHeight||90, left=Math.min(stage.clientWidth-tipW-8,Math.max(8,x+14)), top=Math.max(8,(y-tipH-10)>=8?(y-tipH-10):Math.min(stage.clientHeight-tipH-8,y+14));
        tooltip.style.left=`${left}px`; tooltip.style.top=`${top}px`;
      }

      function clampView(){
        const b=bounds(); const spanX=view.maxX-view.minX;
        if(spanX>(b.maxX-b.minX)){ view.minX=b.minX; view.maxX=b.maxX; return; }
        if(view.minX<b.minX){ view.maxX+=b.minX-view.minX; view.minX=b.minX; }
        if(view.maxX>b.maxX){ view.minX-=view.maxX-b.maxX; view.maxX=b.maxX; }
      }

      modeSel.addEventListener('change',e=>{ mode=e.target.value; visible={}; resetVisible(); fit(); renderLegend(); resize(); });
      btnFit.addEventListener('click',fit);
      btnReset.addEventListener('click',()=>{ visible={}; resetVisible(); fit(); renderLegend(); });
      btnShowAll.addEventListener('click',()=>{ currentCfg().items.forEach(item=>visible[item.key]=true); fit(); renderLegend(); });
      btnHideAll.addEventListener('click',()=>{ currentCfg().items.forEach(item=>visible[item.key]=false); fit(); renderLegend(); });
      stage.addEventListener('wheel',e=>{ e.preventDefault(); const cfg=currentCfg(); const plot=stage._plot||{x:82,w:Math.max(120,stage.clientWidth-112)}; const xRatio=Math.min(1,Math.max(0,(e.offsetX-plot.x)/Math.max(1,plot.w))); const factor=e.deltaY>0?1.12:0.88; const span=view.maxX-view.minX; const b=bounds(); const minSpan=cfg.type==='line'?25:1.4; const newSpan=Math.max(minSpan,Math.min(b.maxX-b.minX,span*factor)); const focus=view.minX+span*xRatio; view.minX=focus-newSpan*xRatio; view.maxX=view.minX+newSpan; clampView(); draw(); },{passive:false});
      stage.addEventListener('pointerdown',e=>{ drag={x:e.clientX,minX:view.minX,maxX:view.maxX}; stage.classList.add('is-dragging'); stage.setPointerCapture(e.pointerId); });
      stage.addEventListener('pointermove',e=>{ updateTooltip(e); if(!drag) return; const plot=stage._plot||{w:stage.clientWidth}; const span=drag.maxX-drag.minX, pxPerUnit=(plot.w||stage.clientWidth)/Math.max(0.001,span), dx=(e.clientX-drag.x)/pxPerUnit; view.minX=drag.minX-dx; view.maxX=drag.maxX-dx; clampView(); draw(); updateTooltip(e); });
      stage.addEventListener('pointerup',e=>{ drag=null; stage.classList.remove('is-dragging'); try{stage.releasePointerCapture(e.pointerId);}catch{} });
      stage.addEventListener('pointerleave',()=>tooltip.style.display='none');
      window.addEventListener('resize',resize);
      fit(); renderLegend(); resize();
    </script>
  </body>
</html>
